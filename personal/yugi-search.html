<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NZ YGO Card Search</title>

  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; margin: 16px; font-size: 12px; }
    h2   { font-size: 14px; margin: 0 0 10px; }
    input  { width: 340px; padding: 6px 8px; font-size: 12px; background: #222; color: #eee; border: 1px solid #444; }
    button { padding: 6px 12px; font-size: 12px; cursor: pointer; }
    #query  { margin-top: 8px; font-size: 12px; color: #ffd700; }
    #status { margin-top: 4px; font-size: 11px; color: #00ffcc; }
    .stores { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .store  { flex: 1 1 280px; padding: 7px 9px; border: 1px solid #2a2a2a; background: #181818; }
    .store-name { font-weight: bold; font-size: 11px; color: #aaa; margin-bottom: 5px; border-bottom: 1px solid #2a2a2a; padding-bottom: 3px; }
    .item { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; margin: 3px 0; font-size: 11px; }
    .item a { color: #4da3ff; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .item a:hover { text-decoration: underline; }
    .price    { color: #7dff7d; font-weight: bold; white-space: nowrap; font-size: 11px; }
    .no-price  { color: #555; font-size: 10px; white-space: nowrap; }
    .sold-out  { color: #ff4444; font-weight: bold; white-space: nowrap; font-size: 11px; }
    .muted { font-size: 10px; color: #555; }
    .muted a { color: #4da3ff; }
  </style>
</head>

<body>

<h2>NZ YGO Card Search</h2>

<input id="q" placeholder="Card name or code, e.g. DUPO-EN017" value="DUPO-EN017" />
<input id="limit" type="number" min="1" max="20" value="10" style="width:50px;" title="Results per site" />
<button onclick="search()">Search</button>

<div id="query"></div>
<div id="status"></div>
<div class="stores" id="results"></div>

<script>

const STORES = [
  // ── Shopify (live API results) ───────────────────────────
  { d: "cardmerchant.co.nz" },
  { d: "cardmerchanthamilton.co.nz" },
  { d: "www.cardmerchanttakapuna.co.nz" },
  { d: "cardmerchantchristchurch.co.nz" },
  { d: "cardmerchantnelson.co.nz" },
  { d: "www.cardmerchantwhangarei.co.nz" },
  { d: "cardspotnz.com" },
  { d: "tcgcollectornz.com" },
  { d: "thegametree.co.nz" },
  { d: "cardmasters.co.nz" },
  { d: "theboardgamer.co.nz" },
  { d: "cardbard.co.nz" },
  { d: "spellboundgames.co.nz" },
  { d: "otakumart.co.nz" },
  { d: "valkyrie-games-nz.myshopify.com" },
  // ── Link-only (non-Shopify — opens search page) ──────────
  { d: "hobbymaster.co.nz",         link: q => `https://hobbymaster.co.nz/search?search=${encodeURIComponent(q)}` },
  { d: "gamersrevelationtcg.co.nz", link: q => `https://gamersrevelationtcg.co.nz/search.php?search_query=${encodeURIComponent(q)}` },
  { d: "cardtopia.co.nz",           link: q => `https://www.cardtopia.co.nz/?s=${encodeURIComponent(q)}&post_type=product&type_aws=true` },
  { d: "trademe.co.nz",             link: q => `https://www.trademe.co.nz/a/search?search_string=${encodeURIComponent(q)}` },
  { d: "vagabond.co.nz",            link: q => `https://vagabond.co.nz/search.php?search_query=${encodeURIComponent(q)}&section=product` },
  { d: "iconix-comics-games.co.nz", link: q => `https://www.iconix-comics-games.co.nz/?q=${encodeURIComponent(q)}` },
];

const TIMEOUT_MS = 6000;

/* Escape user/API text before inserting into HTML */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* Normalise Shopify price — handles "$10.99", "10.99", "1099" (cents) */
function fmtPrice(raw) {
  if (raw == null || raw === '') return '';
  const digits = String(raw).replace(/[^0-9.]/g, '');
  const n = parseFloat(digits);
  if (!n) return '';
  /* Shopify suggest.json returns cents as an integer string with no decimal */
  const isCents = !String(raw).includes('.') && n > 200;
  return '$' + (isCents ? (n / 100) : n).toFixed(2);
}

const PROXY = 'https://corsproxy.io/?';

/* Fetch JSON with abort timeout */
function fetchJSON(url) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
  const proxied = PROXY + encodeURIComponent(url);
  return fetch(proxied, { signal: ctrl.signal })
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .finally(() => clearTimeout(tid));
}

/* Query one Shopify store via suggest.json */
async function searchStore(store, query, limit) {
  const domain = store.d;
  const fallback = `https://${domain}/search?q=${encodeURIComponent(query)}`;
  const url = `https://${domain}/search/suggest.json?q=${encodeURIComponent(query)}`
            + `&resources[type]=product&resources[limit]=${limit}`;
  try {
    const data = await fetchJSON(url);
    const products = data?.resources?.results?.products;
    if (products?.length) {
      return {
        ok: true,
        items: products.map(p => ({
          title:   p.title,
          link:    `https://${domain}/products/${p.handle}`,
          price:   fmtPrice(p.price),
          soldOut: p.available === false
        }))
      };
    }
    return { ok: false, reason: 'empty', href: fallback };
  } catch (e) {
    return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: fallback };
  }
}

/* Build the HTML for one store card */
function renderStore(store, result, query) {
  const domain = store.d;
  let inner = '';
  if (result.ok) {
    inner = result.items.map(r => {
      const badge = r.soldOut
        ? `<span class="sold-out">SOLD OUT${r.price ? ' ' + r.price : ''}</span>`
        : r.price
          ? `<span class="price">${esc(r.price)}</span>`
          : `<span class="no-price">—</span>`;
      return `<div class="item"><a href="${esc(r.link)}" target="_blank" rel="noopener">${esc(r.title)}</a>${badge}</div>`;
    }).join('');
  } else if (result.reason === 'link') {
    inner = `<div class="muted"><a href="${esc(result.href)}" target="_blank" rel="noopener">open search →</a></div>`;
  } else {
    const label = result.reason === 'empty' ? 'no results' : result.reason;
    inner = `<div class="muted">${label} — <a href="${esc(result.href)}" target="_blank" rel="noopener">open site</a></div>`;
  }
  return `<div class="store"><div class="store-name">${esc(domain)}</div>${inner}</div>`;
}

async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;

  const shopifyStores = STORES.filter(s => !s.link);
  const limit = Math.max(1, Math.min(20, parseInt(document.getElementById('limit').value) || 10));
  document.getElementById('query').textContent = 'Searching: ' + q;
  document.getElementById('status').textContent = `Querying ${shopifyStores.length} Shopify stores + ${STORES.length - shopifyStores.length} link-only…`;

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  /* Render all slots — link-only stores populate immediately, Shopify show placeholder */
  const slots = STORES.map(store => {
    const div = document.createElement('div');
    div.className = 'store';
    if (store.link) {
      div.innerHTML = renderStore(store, { ok: false, reason: 'link', href: store.link(q) }, q)
        .replace(/^<div class="store">/, '').replace(/<\/div>$/, '');
    } else {
      div.innerHTML = `<div class="store-name">${esc(store.d)}</div><div class="muted">searching…</div>`;
    }
    resultsEl.appendChild(div);
    return div;
  });

  let done = 0;
  const promises = STORES.map((store, i) => {
    if (store.link) return Promise.resolve();
    return searchStore(store, q, limit).then(result => {
      const fresh = document.createElement('div');
      fresh.className = 'store';
      fresh.innerHTML = renderStore(store, result, q)
        .replace(/^<div class="store">/, '').replace(/<\/div>$/, '');
      slots[i].replaceWith(fresh);
      slots[i] = fresh;
      done++;
      document.getElementById('status').textContent = `${done} / ${shopifyStores.length} Shopify done`;
    });
  });

  await Promise.all(promises);
  document.getElementById('status').textContent = `Done — ${STORES.length} stores searched`;
}

document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
document.getElementById('limit').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

</script>

</body>
</html>
