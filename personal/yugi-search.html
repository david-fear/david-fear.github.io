<html>

<head>

  <meta name="keywords" content="Yu-Gi-Oh cards NZ, YGO cards New Zealand, buy yugioh cards NZ, yugioh card prices NZ, TCG cards New Zealand, card merchant NZ, yugioh online store NZ, yugioh price compare NZ" />

  <meta property="og:title" content="NZ Yu-Gi-Oh Card Price Search | Compare YGO Prices Across NZ Stores" />

  <style>
    .search-header {
      display: block;
      text-align: center;
    }

    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }

    .search-controls {
      display: grid;
      grid-template-columns: auto auto auto;
      gap: 4px 12px;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
    }

    .ctrl-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .search-controls button {
      padding: 10px 12px;
      font-size: 12px;
      white-space: nowrap;
      background: var(--primary);
      color: #fff;
    }

    .search-examples {
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      text-align: left;
      padding-left: 8px;
    }

    .search-examples summary {
      cursor: pointer;
      color: #d0d0d0;
      font-weight: bold;
      user-select: none;
      letter-spacing: 0.3px;
      text-align: center;
    }

    .search-examples a {
      color: var(--primary);
    }

    .search-examples div {
      border-left: 2px solid #d0d0d0;
      border-right: 2px solid #d0d0d0;
      margin-top: 5px;
      line-height: 1.9;
      text-align: center;
      width: 100%;
    }

    .btn-fuzzy span {
      display: inline-block;
      transition: filter 0.2s ease, text-shadow 0.2s ease;
    }

    .btn-fuzzy:hover span,
    .btn-fuzzy:active span {
      filter: blur(0.7px);
      text-shadow:
        0 0 2px rgba(255, 255, 255, 0.7),
        0 0 4px rgba(255, 255, 255, 0.4);
    }


    .legend {
      font-size: 12px;
      color: #ccc;
      display: flex;
      flex-direction: row;
      gap: 14px;
      margin-top: 8px;
      white-space: nowrap;
      justify-content: center;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    input {
      padding: 5px 7px;
      font-size: 16px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
    }

    #q {
      flex: 1;
      min-width: 160px;
    }

    #query {
      margin-top: 8px;
      font-size: 12px;
      color: #ffd700;
    }

    #status {
      margin-top: 4px;
      font-size: 11px;
      color: #00ffcc;
    }

    .stores {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    @media (min-width: 1081px) {
      .stores {
        grid-template-columns: repeat(3, minmax(360px, 1fr));
      }
    }

    @media (max-width: 1080px) {
      .stores {
        grid-template-columns: repeat(2, minmax(360px, 1fr));
      }
    }

    @media (max-width: 740px) {
      .stores {
        grid-template-columns: 1fr;
      }
    }

    .store {
      min-width: 0;
      padding: 7px 9px;
      border: 1px solid #2a2a2a;
      background: #181818;
    }

    .store-name {
      font-weight: bold;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 3px;
    }

    .item {
      position: relative;
      margin: 3px 0;
      font-size: 11px;
    }

    .item a {
      display: block;
      text-decoration: none;
      padding-right: 66px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Roboto Condensed', Arial Narrow, Arial, sans-serif;
      line-height: 1.3;
      letter-spacing: -0.2px;
      border-bottom: 1px dashed #333;
    }

    .item a:hover {
      text-decoration: underline;
    }

    .price {
      position: absolute;
      right: 0;
      top: 0;
      color: #7dff7d;
      font-weight: bold;
      white-space: nowrap;
      font-size: 11px;
      background: linear-gradient(to right, transparent, #181818 22%);
      padding-left: 10px;
    }

    .no-price {
      position: absolute;
      right: 0;
      top: 0;
      color: #555;
      font-size: 10px;
      white-space: nowrap;
      background: #181818;
    }

    .sold-out {
      position: absolute;
      right: 0;
      top: 0;
      color: #ff4444;
      font-weight: bold;
      white-space: nowrap;
      font-size: 11px;
      background: linear-gradient(to right, transparent, #181818 22%);
      padding-left: 10px;
    }

    .muted {
      font-size: 12px;
      color: #808080;
      font-style: italic;
      letter-spacing: 0.2px;
    }

    .muted a {
      font-style: italic;
    }

    .json-link {
      font-size: 9px;
      font-weight: normal;
      margin-left: 6px;
    }

    .store-note {
      font-size: 10px;
      color: #b0b0b0;
      font-style: italic;
      margin-left: 6px;
    }

  </style>
</head>

<body>

  <div id="menu-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/menu.html')
      .then(response => response.text())
      .then(data => {
        const container = document.getElementById('menu-container');
        container.innerHTML = data;

        // Now attach event listeners because the elements exist
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('menu-nav');

        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          if (menu.hasAttribute('hidden')) {
            menu.removeAttribute('hidden');
          } else {
            menu.setAttribute('hidden', '');
          }
        });

        toggle.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle.click();
          }
        });
      })
      .catch(e => console.error('Failed to load menu:', e));
  </script>
  <!-- Dynamic sidebar menu END -->

  <main>
    <section>
      <div class="search-header">
        <h3>NZ Yu-Gi-Oh Card Search</h3>
        <div class="search-row">
          <input id="q" placeholder="Card name or code, e.g. DUPO-EN017" value="" title="Card name or code"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />

          <div class="ctrl-col"><button onclick="search(true);window.goatcounter&&goatcounter.count({path:'search-exact',event:true})">Exact Search</button></div>

  <div id="query"></div>
  <div id="status"></div>
  <div class="stores" id="results"></div>

  <script>

    let linkTarget = location.hash === '#sametab' ? '_self' : '_blank';
    let ygoPanelNode = null;

    const STORES = [
      // ── Shopify (live API results) ───────────────────────────
      { d: "cardspotnz.com", note: " ** card name search only; data model differs **" },
      { d: "www.shuffleandcutgames.co.nz" },
      { d: "tcgcollectornz.com" },
      { d: "tcgculture.com" },
      { d: "cardbard.co.nz" },
      { d: "spellboundgames.co.nz" },
      { d: "valkyrie-games-nz.myshopify.com" },
      { d: "www.baydragon.co.nz", scraper: searchBayDragon },
      { d: "otakumart.co.nz" },
      { d: "goblingames.nz" },
      { d: "hobbymaster.co.nz", scraper: searchHobbymaster },
      { d: "gamersrevelationtcg.co.nz", scraper: searchGamersRevelation },
      { d: "www.cardtopia.co.nz" },
      { d: "iconix-comics-games.co.nz", scraper: searchIconix },
      { d: "cgstore.co.nz", scraper: searchCGStore },
      { d: "cardmasters.co.nz" },
      { d: "cardmerchant.co.nz" },
      { d: "cardmerchanthamilton.co.nz" },
      { d: "www.cardmerchanttakapuna.co.nz" },
      { d: "cardmerchantnelson.co.nz" },
      { d: "www.cardmerchantwhangarei.co.nz" },
      { d: "cardmerchantchristchurch.co.nz" },
      { d: "cardmerchantponsonby.co.nz" },
      { d: "thegametree.co.nz" },
      // ── Link-only (non-Shopify — opens search page) ──────────
    ];

    /* Stores that can't be live-scraped (Cloudflare-protected etc.) — shown as a link-only group */
    const LINK_STORES = [
      { d: 'mtgsingles.co.nz (direct card code lookup)', url: q => `https://www.mtgsingles.co.nz/card/${encodeURIComponent(q)}` },
      { d: 'tcgplayer.com (USD — international market price)', url: q => `https://www.tcgplayer.com/search/all/product?q=${encodeURIComponent(q)}&view=grid` },
      { d: 'collectr.com (USD — international market price)', url: q => `https://app.getcollectr.com/?query=${encodeURIComponent(q)}` },
      { d: 'vagabond.co.nz',  url: q => `https://vagabond.co.nz/search.php?search_query=${encodeURIComponent(q)}&section=product` },
      { d: 'trademe.co.nz',  url: q => `https://www.trademe.co.nz/a/marketplace/gaming/trading-cards/search?search_string=${encodeURIComponent(q)}` },
      { d: 'www.hobbylords.co.nz', url: q => `https://www.hobbylords.co.nz/shop/shop-all/search?product_keyword=${encodeURIComponent(q)}&p=1` },
      { d: 'novagames.co.nz', url: q => `https://novagames.co.nz/search?type=product&options[prefix]=last&q=${encodeURIComponent(q)}` },
    ];

    /* Stores that are coming soon — shown as a preview section */
    const COMING_SOON_STORES = [
      { d: 'rawr.cards', url: 'https://www.rawr.cards/' },
    ];

    const TIMEOUT_MS = 6000;
    const ENABLE_ALLORIGINS_FALLBACK = false;

    /* Escape user/API text before inserting into HTML */
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* Normalise Shopify price — handles "$10.99", "10.99", "1099" (cents) */
    function fmtPrice(raw) {
      if (raw == null || raw === '') return '';
      const digits = String(raw).replace(/[^0-9.]/g, '');
      const n = parseFloat(digits);
      if (!n) return '';
      /* Shopify suggest.json returns cents as an integer string with no decimal */
      const isCents = !String(raw).includes('.') && n > 200;
      return '$' + (isCents ? (n / 100) : n).toFixed(2);
    }

    const PROXY = 'https://corsproxy.io/?';

    /* Remove external asset tags from fetched HTML so parser never follows vendor CSS/JS/image URLs. */
    function stripExternalAssets(html) {
      return String(html || '')
        .replace(/<link\b[^>]*>/gi, '')
        .replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '')
        .replace(/<img\b[^>]*>/gi, '')
        .replace(/<iframe\b[^>]*>[\s\S]*?<\/iframe>/gi, '');
    }

    /* Return true if every token in the query appears in the product title or handle */
    function matchesQuery(product, query) {
      const haystack = (product.title + ' ' + (product.handle || '')).toLowerCase();
      const tokens = query.toLowerCase().split(/[\s\-]+/).filter(Boolean);
      return tokens.every(t => haystack.includes(t));
    }

    /* Fetch JSON with abort timeout */
    function fetchJSON(url) {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      const proxied = PROXY + encodeURIComponent(url);
      return fetch(proxied, { signal: ctrl.signal })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .finally(() => clearTimeout(tid));
    }

    /* Query one Shopify store via suggest.json */
    async function searchStore(store, query, limit, exact) {
      const domain = store.d;
      const fallback = `https://${domain}/search?q=${encodeURIComponent(query)}`;
      const apiUrl = `https://${domain}/search/suggest.json?q=${encodeURIComponent(query)}&resources[type]=product&resources[limit]=${limit}`;
      try {
        const data = await fetchJSON(apiUrl);
        const products = data?.resources?.results?.products;
        if (products?.length) {
          const matched = exact ? products.filter(p => matchesQuery(p, query)) : products;
          if (matched.length) {
            return {
              ok: true,
              apiUrl,
              href: fallback,
              items: matched.map(p => ({
                title: p.title + (domain === 'cardspotnz.com' && p.type ? ` (${p.type})` : ''),
                link: `https://${domain}/products/${p.handle}`,
                price: fmtPrice(p.price_max),
                soldOut: p.available === false
              }))
            };
          }
        }
        return { ok: false, reason: 'empty', href: fallback, apiUrl };
      } catch (e) {
        return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: fallback, apiUrl };
      }
    }

    /* Query hobbymaster.co.nz in-stock YGO singles via jqGrid JSON endpoint
       cell: [0]=name, [1]=set, [8]=rarity, [9]=condition, [10]=price, [12]=qty, id=card ID
       All rows returned by this endpoint are in-stock. */
    async function searchHobbymaster(store, query, limit, exact) {
      const domain = 'hobbymaster.co.nz';
      const fallback = `https://${domain}/search?search=${encodeURIComponent(query)}`;
      const rows = 99999
      const apiUrl = `https://${domain}/cards/get-cards?lang=&game=3&foil=&_search=false&nd=${Date.now()}&rows=${rows}&page=1&sidx=price&sord=asc&searchField=name&searchString=${encodeURIComponent(query)}&searchOper=cn`;
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      try {
        const proxied = PROXY + encodeURIComponent(apiUrl);
        const resp = await fetch(proxied, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        const rawRows = data?.rows;
        if (!rawRows?.length) return { ok: false, reason: 'empty', href: fallback, apiUrl };
        const matched = exact
          ? rawRows.filter(r => matchesQuery({ title: r.cell[0] || '', handle: '' }, query))
          : rawRows;
        if (!matched.length) return { ok: false, reason: 'empty', href: fallback, apiUrl };
        const items = matched.slice(0, limit).map(r => {
          const c = r.cell;
          const name = c[0] || '';
          const rarity = c[8] || '';
          return {
            title: rarity ? `${name} (${rarity})` : name,
            link: `https://${domain}/cards/card/${r.id}`,
            price: c[10] || '',
            soldOut: false  // endpoint only returns in-stock items
          };
        });
        return { ok: true, items, apiUrl, href: fallback };
      } catch (e) {
        clearTimeout(tid);
        return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: fallback, apiUrl };
      }
    }

    /* Query gamersrevelationtcg.co.nz via BigCommerce HTML scrape */
    async function searchGamersRevelation(store, query, limit, exact) {
      const domain = 'gamersrevelationtcg.co.nz';
      const fallback = `https://${domain}/search.php?search_query=${encodeURIComponent(query)}`;
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      try {
        const proxied = PROXY + encodeURIComponent(fallback);
        const resp = await fetch(proxied, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!resp.ok) throw new Error(resp.status);
        const html = stripExternalAssets(await resp.text());
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const cards = [...doc.querySelectorAll('article.card')];
        if (!cards.length) return { ok: false, reason: 'empty', href: fallback };
        const matched = exact
          ? cards.filter(c => {
              const a = c.querySelector('.card-title a, h4 a');
              return a && matchesQuery({ title: a.textContent.trim(), handle: '' }, query);
            })
          : cards;
        if (!matched.length) return { ok: false, reason: 'empty', href: fallback };
        const items = matched.slice(0, limit).map(card => {
          const titleEl = card.querySelector('.card-title a, h4 a');
          const title = titleEl ? titleEl.textContent.trim() : '';
          let link = titleEl ? titleEl.getAttribute('href') : fallback;
          if (link && !link.startsWith('http')) link = `https://${domain}${link}`;
          try { const u = new URL(link); u.searchParams.delete('searchid'); u.searchParams.delete('search_query'); link = u.toString(); } catch {}
          const priceEl = card.querySelector('[data-product-price-with-tax], [data-product-price-without-tax], .price--withTax, .price--main, .price');
          const price = priceEl ? priceEl.textContent.trim() : '';
          const soldOut = !!card.querySelector('.button--soldOut, [data-button-state="soldOut"]');
          return { title, link, price, soldOut };
        });
        return { ok: true, items, href: fallback };
      } catch (e) {
        clearTimeout(tid);
        return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: fallback };
      }
    }

    /* Query iconix-comics-games.co.nz via eDIY platform HTML scrape.
       Tries corsproxy.io first, falls back to allorigins.win if blocked.
       Price: data-amt attribute is in units of 1/10000 NZD (80000 = $8.00).
       Stock: span.preorder-date contains "N available now" when in stock. */
    async function searchIconix(store, query, limit, exact) {
      const domain = 'www.iconix-comics-games.co.nz';
      const targetUrl = `https://${domain}/?q=${encodeURIComponent(query)}`;
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      const proxies = [PROXY + encodeURIComponent(targetUrl)];
      if (ENABLE_ALLORIGINS_FALLBACK) {
        proxies.push(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
      }
      try {
        let html = null;
        for (const proxied of proxies) {
          try {
            const resp = await fetch(proxied, { signal: ctrl.signal });
            if (!resp.ok) continue;
            const text = await resp.text();
            if (text.includes('product-item-box')) { html = text; break; }
          } catch (e2) {
            if (e2.name === 'AbortError') throw e2;
          }
        }
        clearTimeout(tid);
        if (!html) return { ok: false, reason: 'unavailable', href: targetUrl };
        const doc = new DOMParser().parseFromString(stripExternalAssets(html), 'text/html');
        const cards = [...doc.querySelectorAll('div.product-item-box')];
        if (!cards.length) return { ok: false, reason: 'empty', href: targetUrl };
        const matched = exact
          ? cards.filter(c => {
              const a = c.querySelector('a.plname');
              return a && matchesQuery({ title: a.textContent.trim(), handle: '' }, query);
            })
          : cards;
        if (!matched.length) return { ok: false, reason: 'empty', href: targetUrl };
        const items = matched.slice(0, limit).map(card => {
          const titleEl = card.querySelector('a.plname');
          const title = titleEl ? titleEl.textContent.trim() : '';
          let link = titleEl ? titleEl.getAttribute('href') : targetUrl;
          if (link && !link.startsWith('http')) link = `https://${domain}${link}`;
          const priceEl = card.querySelector('span.price[data-amt]');
          const priceAmt = priceEl ? parseInt(priceEl.getAttribute('data-amt'), 10) : 0;
          const price = priceAmt ? `$${(priceAmt / 10000).toFixed(2)}` : '';
          const availEl = card.querySelector('span.preorder-date');
          const soldOut = !availEl || !/available\s+now/i.test(availEl.textContent);
          return { title, link, price, soldOut };
        });
        return { ok: true, items, href: targetUrl };
      } catch (e) {
        clearTimeout(tid);
        return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: targetUrl };
      }
    }

    /* Query www.baydragon.co.nz via AJAX autocomplete (names only — no prices).
       Deduplicates by title; each result links to the full HTML search for that name.
       result.pricingHref triggers a "show with pricing" footer link in renderStore. */
    async function searchBayDragon(store, query, limit, exact) {
      const domain = 'www.baydragon.co.nz';
      const fallback = `https://${domain}/search/category/01?searchType=single&searchString=${encodeURIComponent(query)}`;
      const apiUrl = `https://${domain}/searchajaxsingles/category/01?userInput=${encodeURIComponent(query)}`;
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      try {
        const proxied = PROXY + encodeURIComponent(apiUrl);
        const resp = await fetch(proxied, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!resp.ok) throw new Error(resp.status);
        const data = await resp.json();
        if (!Array.isArray(data) || !data.length) return { ok: false, reason: 'empty', href: fallback, apiUrl };
        const matched = exact
          ? data.filter(r => matchesQuery({ title: (r.value || '').trim(), handle: '' }, query))
          : data;
        if (!matched.length) return { ok: false, reason: 'empty', href: fallback, apiUrl };
        const seen = new Set();
        const items = [];
        for (const r of matched) {
          const title = (r.value || r.label || '').replace(/^ygo\s*-\s*/i, '').trim();
          if (seen.has(title)) continue;
          seen.add(title);
          const link = `https://${domain}/search/category/01?searchType=single&searchString=${encodeURIComponent(title)}`;
          items.push({ title, link, price: '', soldOut: false });
          if (items.length >= limit) break;
        }
        return { ok: true, items, apiUrl, href: fallback, pricingHref: fallback };
      } catch (e) {
        clearTimeout(tid);
        return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: fallback };
      }
    }

    /* Query cgstore.co.nz (Cerberus Games Wellington) via BigCommerce HTML scrape */
    async function searchCGStore(store, query, limit, exact) {
      const domain = 'cgstore.co.nz';
      const fallback = `https://${domain}/search.php?search_query=${encodeURIComponent(query)}`;
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      try {
        const proxied = PROXY + encodeURIComponent(fallback);
        const resp = await fetch(proxied, { signal: ctrl.signal });
        clearTimeout(tid);
        if (!resp.ok) throw new Error(resp.status);
        const html = stripExternalAssets(await resp.text());
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const cards = [...doc.querySelectorAll('article.card')];
        if (!cards.length) return { ok: false, reason: 'empty', href: fallback };
        const matched = exact
          ? cards.filter(c => {
              const a = c.querySelector('.card-title a, h4 a');
              return a && matchesQuery({ title: a.textContent.trim(), handle: '' }, query);
            })
          : cards;
        if (!matched.length) return { ok: false, reason: 'empty', href: fallback };
        const items = matched.slice(0, limit).map(card => {
          const titleEl = card.querySelector('.card-title a, h4 a');
          const title = titleEl ? titleEl.textContent.trim() : '';
          let link = titleEl ? titleEl.getAttribute('href') : fallback;
          if (link && !link.startsWith('http')) link = `https://${domain}${link}`;
          try { const u = new URL(link); u.searchParams.delete('searchid'); u.searchParams.delete('search_query'); link = u.toString(); } catch {}
          const priceEl = card.querySelector('[data-product-price-with-tax], [data-product-price-without-tax], .price--withTax, .price--main, .price');
          const price = priceEl ? priceEl.textContent.trim() : '';
          const soldOut = !!card.querySelector('.button--soldOut, [data-button-state="soldOut"]');
          return { title, link, price, soldOut };
        });
        return { ok: true, items, href: fallback };
      } catch (e) {
        clearTimeout(tid);
        return { ok: false, reason: e.name === 'AbortError' ? 'timeout' : 'unavailable', href: fallback };
      }
    }

    /* Build the HTML for one store card */
    function renderStore(store, result, query) {
      const domain = store.d;
      const noteHtml = store.note
        ? ` <span class="store-note">${esc(store.note)}</span>`
        : '';
      const viewHref = result.apiUrl || result.href || '';
      const viewLabel = result.apiUrl ? 'view JSON' : 'view website';
      const jsonLink = viewHref
        ? ` <a class="json-link" href="${esc(viewHref)}" target="_blank" rel="noopener">[${viewLabel}]</a>${noteHtml}`
        : noteHtml;
      let inner = '';
      if (result.ok) {
        inner = result.items.map(r => {
          const badge = r.soldOut
            ? `<span class="sold-out">${r.price ? r.price : '—'}</span>`
            : r.price
              ? `<span class="price">${esc(r.price)}</span>`
              : `<span class="no-price">—</span>`;
          return `<div class="item"><a href="${esc(r.link)}" target="${linkTarget}" rel="noopener">${esc(r.title)}</a>${badge}</div>`;
        }).join('');
        if (result.pricingHref) {
          inner += `<div class="muted" style="margin-top:4px;"><a href="${esc(result.pricingHref)}" target="${linkTarget}" rel="noopener">→ show HTML search with pricing</a></div>`;
        }
      } else if (result.reason === 'link') {
        inner = `<div class="muted"><a href="${esc(result.href)}" target="${linkTarget}" rel="noopener">[not implemented yet - open site search →]</a></div>`;
      } else {
        const label = result.reason === 'empty' ? 'no results' : result.reason;
        inner = `<div class="muted">${label} → <a href="${esc(result.href)}" target="${linkTarget}" rel="noopener">open site</a></div>`;
      }
      return `<div class="store"><div class="store-name">${esc(domain)}${jsonLink}</div>${inner}</div>`;
    }

    // ── YGOPRODeck card lookup ───────────────────────────────────────────────

    const YGO_CODE_RE = /^[A-Z][A-Z0-9]{1,7}-[A-Z]{2}\d{3,}$/i;
    let _cardSetsCache = null;

    async function fetchCardSets() {
      if (_cardSetsCache) return _cardSetsCache;
      const r = await fetch('https://db.ygoprodeck.com/api/v7/cardsets.php');
      if (!r.ok) throw new Error('cardsets unavailable');
      _cardSetsCache = await r.json();
      return _cardSetsCache;
    }

    function renderYGOPanel(card, matchCode) {
      const img    = card.card_images?.[0];
      const imgUrl = img?.image_url || '';
      const isLink = /link/i.test(card.type || '');

      const statParts = [];
      if (/monster/i.test(card.type || '')) {
        const levelLabel = /xyz/i.test(card.type) ? 'Rank' : isLink ? 'Link' : 'Level';
        const levelVal   = card.level ?? card.linkval;
        if (levelVal != null) statParts.push(`${levelLabel} ${levelVal}`);
        if (card.attribute) statParts.push(card.attribute);
        if (card.atk != null) statParts.push(isLink ? `ATK ${card.atk}` : `ATK ${card.atk} / DEF ${card.def}`);
      }

      const setsRows = (card.card_sets || []).map(s => {
        const hi    = matchCode && s.set_code.toUpperCase() === matchCode.toUpperCase();
        const price = s.set_price && s.set_price !== '0.00' ? '$' + parseFloat(s.set_price).toFixed(2) : '\u2014';
        return `<tr style="${hi ? 'background:#1a2a1a;' : ''}">
          <td style="padding:2px 6px;color:#aaa;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(s.set_name)}">${esc(s.set_name)}</td>
          <td style="padding:2px 6px;font-family:monospace;font-size:10px;"><a href="#" onclick="document.getElementById('q').value='${esc(s.set_code)}';search(true);return false;" style="color:${hi ? '#7dff7d' : '#88aaff'};text-decoration:underline;cursor:pointer;font-family:monospace;font-size:10px;">${esc(s.set_code)}</a></td>
          <td style="padding:2px 6px;color:#aaa;">${esc(s.set_rarity)}</td>
          <td style="padding:2px 6px;color:#7dff7d;white-space:nowrap;">${esc(price)} <span style="color:#333;font-size:9px;">USD</span></td>
        </tr>`;
      }).join('');

      const setsSection = card.card_sets?.length ? `
        <details style="margin-top:10px;" open>
          <summary style="cursor:pointer;font-size:11px;color:#888;user-select:none;">
            ${card.card_sets.length} print${card.card_sets.length !== 1 ? 's' : ''} across sets
          </summary>
          <div style="overflow-x:auto;margin-top:6px;">
            <table style="border-collapse:collapse;font-size:11px;width:100%;">
              <thead><tr style="color:#444;text-align:left;">
                <th style="padding:2px 6px;border-bottom:1px solid #1e1e1e;">Set</th>
                <th style="padding:2px 6px;border-bottom:1px solid #1e1e1e;">Code</th>
                <th style="padding:2px 6px;border-bottom:1px solid #1e1e1e;">Rarity</th>
                <th style="padding:2px 6px;border-bottom:1px solid #1e1e1e;">~Price</th>
              </tr></thead>
              <tbody>${setsRows}</tbody>
            </table>
          </div>
        </details>` : '';

      return `
        <div style="background:#131310;border:1px solid #3a3510;padding:14px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;">
          ${imgUrl ? `<img src="${esc(imgUrl)}" alt="${esc(card.name)}" style="width:120px;height:auto;border:1px solid #2a2a1a;flex-shrink:0;" loading="lazy" />` : ''}
          <div style="flex:1;min-width:220px;">
            <div style="font-size:15px;font-weight:bold;color:#ffd700;margin-bottom:4px;">${esc(card.name)}</div>
            <div style="font-size:11px;color:#555;margin-bottom:6px;">${esc(card.type || '')}${card.race ? ' &middot; ' + esc(card.race) : ''}</div>
            ${statParts.length ? `<div style="font-size:11px;color:#aaa;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;">${statParts.map(p => `<span>${esc(p)}</span>`).join('')}</div>` : ''}
            <div style="font-size:11px;color:#bbb;line-height:1.7;border-top:1px solid #1e1e1e;padding-top:8px;white-space:pre-line;">${esc(card.desc || '')}</div>
            ${setsSection}
          </div>
        </div>
        <div style="font-size:9px;color:#252510;text-align:right;margin-top:1px;">via YGOPRODeck API${matchCode ? ' &middot; ' + esc(matchCode) : ''}</div>`;
    }

    async function lookupYGOCard(query, onResult) {
      const YGO_TIMEOUT_MS = 5000;
      try {
        const trimmed = query.trim();
        let card = null;
        let matchCode = null;
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), YGO_TIMEOUT_MS);

        if (YGO_CODE_RE.test(trimmed)) {
          matchCode = trimmed.toUpperCase();
          const setCode = matchCode.match(/^([A-Z][A-Z0-9]+)-/)[1];
          const sets    = await fetchCardSets();
          const setInfo = sets.find(s => s.set_code.toUpperCase() === setCode);
          if (setInfo) {
            const r = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?cardset=${encodeURIComponent(setInfo.set_name)}`, { signal: ctrl.signal });
            if (r.ok) {
              const d = await r.json();
              card = (d.data || []).find(c => (c.card_sets || []).some(s => s.set_code.toUpperCase() === matchCode)) || null;
            }
          }
        } else {
          const r = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(trimmed)}`, { signal: ctrl.signal });
          if (r.ok) {
            const d = await r.json();
            if (d.data?.length === 1) card = d.data[0];
          }
        }
        clearTimeout(tid);

        if (card) {
          const node = document.createElement('div');
          node.style.cssText = 'grid-column: 1 / -1; border: 1px solid #b8860b; background: #1a1500; box-shadow: 0 0 22px rgba(255,200,0,0.18), inset 0 0 0 1px rgba(255,200,0,0.10); margin-bottom: 2px;';
          node.innerHTML = `<details open>
            <summary style="cursor:pointer; padding:9px 14px; font-size:13px; font-weight:bold; color:#ffd700; user-select:none; text-shadow:0 0 10px rgba(255,200,0,0.5);">
              &#9733; YGOPRODeck: ${esc(card.name)}&ensp;<small style="font-size:10px; font-weight:normal; color:#888;">(click to expand/collapse)</small>
            </summary>
            <div style="padding:0 12px 12px;">${renderYGOPanel(card, matchCode)}</div>
          </details>`;
          onResult(node);
        }
      } catch (e) {
        console.warn('YGO lookup:', e);
      }
    }

    async function search(exact = true) {
      const q = document.getElementById('q').value.trim();
      if (!q) return;

      const fetchStores = STORES.filter(s => !s.link);
      const limit = Math.max(1, Math.min(20, parseInt(document.getElementById('limit').value) || 10));
      const queryEl = document.getElementById('query');
      queryEl.innerHTML = (exact ? 'Exact search: ' : 'Fuzzy search: ') + '<b>' + esc(q) + '</b>';
      document.getElementById('status').textContent = `Querying ${fetchStores.length} stores…`;

      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = '';
      ygoPanelNode = null;
      lookupYGOCard(q, node => { ygoPanelNode = node; reorderStoreCards(); });
      let linkGroupNode = null;

      /* Render all slots — link-only stores populate immediately, Shopify show placeholder */
      const slots = STORES.map(store => {
        const div = document.createElement('div');
        div.className = 'store';
        div.dataset.resultState = 'pending';
        div.dataset.storeDomain = store.d;
        if (store.link) {
          div.innerHTML = renderStore(store, { ok: false, reason: 'link', href: store.link(q) }, q)
            .replace(/^<div class="store">/, '').replace(/<\/div>$/, '');
        } else {
          div.innerHTML = `<div class="store-name">${esc(store.d)}</div><div class="muted">searching…</div>`;
        }
        resultsEl.appendChild(div);
        return div;
      });

      /* Render the links-only group immediately; fetch live USD→NZD rate in parallel */
      if (LINK_STORES.length) {
        const linkDiv = document.createElement('div');
        linkDiv.className = 'store';
        linkDiv.style.cssText = 'border-color:#6a6a6a; background:#242424; box-shadow: 0 0 18px rgba(255,255,255,0.18), 0 0 34px rgba(255,255,255,0.08), inset 0 0 0 1px rgba(255,255,255,0.08);';
        linkDiv.innerHTML =
          `<div class="store-name" style="color:#f1f1f1; border-bottom-color:#4a4a4a; text-shadow:0 0 8px rgba(255,255,255,0.18);">external links &amp; reference prices (unattainable APIs)</div>` +
          LINK_STORES.map(s =>
            `<div class="item" style="font-size:12px;"><a href="${esc(s.url(q))}" target="${linkTarget}" rel="noopener" style="color:#f0f0f0; text-shadow:0 0 6px rgba(255,255,255,0.12);">${esc(s.d)}</a></div>`
          ).join('');
        resultsEl.appendChild(linkDiv);
        linkGroupNode = linkDiv;
      }

      /* Render coming-soon group — inserted between YGO panel and external links */
      let comingSoonNode = null;
      if (COMING_SOON_STORES.length) {
        const csDiv = document.createElement('div');
        csDiv.className = 'store';
        csDiv.style.cssText = 'border-color:#665500; background:#1e1a00; box-shadow: 0 0 18px rgba(255,200,0,0.1), inset 0 0 0 1px rgba(255,200,0,0.08);';
        csDiv.innerHTML =
          `<div class="store-name" style="color:#ffcc00; border-bottom-color:#443800; text-shadow:0 0 8px rgba(255,200,0,0.3);">🔜 coming soon</div>` +
          COMING_SOON_STORES.map(s =>
            `<div class="item" style="font-size:12px;"><a href="${esc(s.url)}" target="${linkTarget}" rel="noopener" style="color:#ffe066; text-shadow:0 0 6px rgba(255,200,0,0.2);">${esc(s.d)}</a></div>`
          ).join('');
        comingSoonNode = csDiv;
        resultsEl.appendChild(csDiv);
      }

      function reorderStoreCards() {
        const stateRank = { hit: 0, pending: 1, miss: 2 };
        const ordered = slots
          .map((node, index) => ({
            node,
            index,
            state: node.dataset.resultState || 'pending',
            domain: node.dataset.storeDomain || STORES[index].d,
            hasInStock: node.dataset.resultState === 'hit' && node.querySelector('.price') !== null
          }))
          .sort((a, b) => {
            // Prioritize in-stock hits at the very top
            if (a.state === 'hit' && b.state === 'hit') {
              if (a.hasInStock !== b.hasInStock) return a.hasInStock ? -1 : 1;
            }
            
            const rankDiff = (stateRank[a.state] ?? 1) - (stateRank[b.state] ?? 1);
            if (rankDiff !== 0) return rankDiff;
            if (a.state === 'miss' && b.state === 'miss') {
              const aCardSpot = a.domain === 'cardspotnz.com';
              const bCardSpot = b.domain === 'cardspotnz.com';
              if (aCardSpot !== bCardSpot) return aCardSpot ? -1 : 1;
            }
            return a.index - b.index;
          });

        if (linkGroupNode) linkGroupNode.remove();
        if (ygoPanelNode?.parentNode) ygoPanelNode.remove();
        if (comingSoonNode?.parentNode) comingSoonNode.remove();

        const hitStores = ordered.filter(e => e.state === 'hit');
        const notHitStores = ordered.filter(e => e.state !== 'hit');

        hitStores.forEach(entry => resultsEl.appendChild(entry.node));
        if (ygoPanelNode) resultsEl.appendChild(ygoPanelNode);
        if (comingSoonNode) resultsEl.appendChild(comingSoonNode);
        if (linkGroupNode) resultsEl.appendChild(linkGroupNode);
        notHitStores.forEach(entry => resultsEl.appendChild(entry.node));
      }

      let done = 0;
      const promises = STORES.map((store, i) => {
        if (store.link) return Promise.resolve();
        return (store.scraper ? store.scraper(store, q, limit, exact) : searchStore(store, q, limit, exact)).then(result => {
          const fresh = document.createElement('div');
          fresh.className = 'store';
          fresh.dataset.resultState = result.ok ? 'hit' : 'miss';
          fresh.dataset.storeDomain = store.d;
          fresh.innerHTML = renderStore(store, result, q)
            .replace(/^<div class="store">/, '').replace(/<\/div>$/, '');
          slots[i].replaceWith(fresh);
          slots[i] = fresh;
          done++;
          document.getElementById('status').textContent = `${done} / ${fetchStores.length} done`;
          reorderStoreCards();
        });
      });

      await Promise.all(promises);
      reorderStoreCards();

      queryEl.innerHTML += ` - ${STORES.length} stores searched`;
      document.getElementById('status').textContent = '';
      document.getElementById('q').focus();
    }

    let lastSearchTime = 0;
    document.getElementById('q').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const now = Date.now();
        if (now - lastSearchTime < 500) return;
        lastSearchTime = now;
        search(true);
      }
    });
    document.getElementById('limit').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const now = Date.now();
        if (now - lastSearchTime < 500) return;
        lastSearchTime = now;
        search(true);
        document.getElementById('q').focus();
      }
    });

    // Initialise same-tab toggle from URL hash; persist choice in hash
    (function () {
      const cb = document.getElementById('same-tab-toggle');
      cb.checked = linkTarget === '_self';
      cb.addEventListener('change', () => {
        linkTarget = cb.checked ? '_self' : '_blank';
        location.hash = cb.checked ? 'sametab' : 'newtab';
        document.querySelectorAll('#results a:not(.json-link)').forEach(a => { a.target = linkTarget; });
      });
    })();

  </script>

  <!-- Footer placeholder -->
  <div id="footer-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => {
        console.error('Failed to load footer:', error);
      });
  </script>
