<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Times Table Trainer</title>

  <link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

  <style>
    /* Trainer-specific styling */

    main {
      padding: 0.5rem 1rem;
    }

    .trainer-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-top: 2rem;
    }

    .trainer-controls label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: min(260px, 80vw);
      font-size: clamp(0.85rem, 2.5vw, 1.3rem);
    }

    .trainer-controls input {
      width: 60px;
      font-size: clamp(0.85rem, 2.5vw, 1.3rem);
      padding: 0.25rem 0.4rem;
      text-align: center;
    }

    .trainer-controls button {
      font-size: clamp(0.95rem, 2.5vw, 1.3rem);
      padding: 0.5rem 2rem;
    }

    .question {
      font-size: 4rem;
      text-align: center;
      margin: 0.4rem 0;
      font-weight: 600;
      white-space: nowrap;
    }

    .answer-highlight {
      color: var(--primary);
      font-weight: 700;
    }

    .timer-container {
      width: 100%;
      max-width: 500px;
      height: 16px;
      background-color: var(--card-bg);
      margin: 0.4rem auto;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background-color: var(--primary);
      transition: width linear;
    }
  </style>

</head>

<body>

  <!-- Dynamic sidebar menu START -->
  <div id="menu-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/menu.html')
      .then(response => response.text())
      .then(data => {
        const container = document.getElementById('menu-container');
        container.innerHTML = data;

        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('menu-nav');

        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          if (menu.hasAttribute('hidden')) {
            menu.removeAttribute('hidden');
          } else {
            menu.setAttribute('hidden', '');
          }
        });

        toggle.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle.click();
          }
        });
      })
      .catch(e => console.error('Failed to load menu:', e));
  </script>
  <!-- Dynamic sidebar menu END -->

  <header>
    <h1>Times Table Trainer</h1>
    <p>Rapid-fire multiplication practice</p>
  </header>

  <main>

    <section>
      <div style="display:flex; gap:0.75rem; justify-content:center; margin-bottom:0.5rem;">
        <button onclick="startQuiz()">Start</button>
        <button onclick="stopQuiz()" style="background:var(--accent, #c0392b);">Stop</button>
      </div>

      <div class="question" id="question">Press Start</div>

      <div class="timer-container">
        <div class="timer-bar" id="timerBar"></div>
      </div>

      <div class="trainer-controls">
        <label>Min: <input type="number" id="min" value="3" min="1" inputmode="numeric" onfocus="this.select()"></label>
        <label>Max: <input type="number" id="max" value="12" min="1" inputmode="numeric" onfocus="this.select()"></label>
        <label>Question time (s): <input type="number" id="questionTime" value="5" min="1" step="0.5" inputmode="decimal" onfocus="this.select()"></label>
        <label>Answer time (s): <input type="number" id="answerTime" value="3" min="0.5" step="0.5" inputmode="decimal" onfocus="this.select()"></label>
      </div>
    </section>

  </main>

  <!-- Footer placeholder -->
  <div id="footer-container"></div>

  <script>
    fetch('https://david-fear.github.io/components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => {
        console.error('Failed to load footer:', error);
      });
  </script>

  <script>
    let count = 0;
    let t1 = null;
    let t2 = null;

    function clearTimers() {
      clearTimeout(t1);
      clearTimeout(t2);
      t1 = null;
      t2 = null;
    }

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function startQuiz() {
      clearTimers();
      count = 0;
      nextQuestion();
    }

    function stopQuiz() {
      clearTimers();
      document.getElementById("question").innerText = "Stopped";
      const timerBar = document.getElementById("timerBar");
      timerBar.style.transition = "none";
      timerBar.style.width = "0%";
    }

    function nextQuestion() {
      const min = parseInt(document.getElementById("min").value);
      const max = parseInt(document.getElementById("max").value);

      if (isNaN(min) || isNaN(max) || min > max) {
        document.getElementById("question").innerText = "Invalid range";
        return;
      }

      const questionTime = (parseFloat(document.getElementById("questionTime").value) || 5) * 1000;
      const answerTime = (parseFloat(document.getElementById("answerTime").value) || 3) * 1000;

      const x = randomBetween(min, max);
      const y = randomBetween(min, max);
      const answer = x * y;

      const questionDiv = document.getElementById("question");
      const timerBar = document.getElementById("timerBar");

      questionDiv.innerHTML = x + " × " + y + " = <span class='answer-highlight'>?</span>";

      timerBar.style.transition = "none";
      timerBar.style.width = "100%";
      void timerBar.offsetWidth;

      timerBar.style.transition = "width " + (questionTime / 1000) + "s linear";
      timerBar.style.width = "0%";

      t1 = setTimeout(function () {
        questionDiv.innerHTML = x + " × " + y + " = <span class='answer-highlight'>" + answer + "</span>";

        timerBar.style.transition = "none";
        timerBar.style.width = "0%";

        t2 = setTimeout(function () {
          count++;
          nextQuestion();
        }, answerTime);

      }, questionTime);
    }
  </script>

</body>

</html>
