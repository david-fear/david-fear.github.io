<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My GitHub Static Site Template</title>

<link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

<style>
  #catGameCanvas {
    background: #111;
    touch-action: manipulation;
    display: block;
    margin: 0 auto;
  }
</style>

</head>

<body>

<!-- Dynamic sidebar menu START -->
<div id="menu-container"></div>
<script>
  fetch('https://david-fear.github.io/components/menu.html')
    .then(response => response.text())
    .then(data => {
      const container = document.getElementById('menu-container');
      container.innerHTML = data;

      const toggle = document.getElementById('menu-toggle');
      const menu = document.getElementById('menu-nav');

      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        if (menu.hasAttribute('hidden')) {
          menu.removeAttribute('hidden');
        } else {
          menu.setAttribute('hidden', '');
        }
      });

      toggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle.click();
        }
      });
    })
    .catch(e => console.error('Failed to load menu:', e));
</script>
<!-- Dynamic sidebar menu END -->

<main>

  <!-- === CAT GAME SECTION === -->
  <section>
    <center>
      <button id="modeButton" class="button">Switch to FEATHER WAND</button>
      <br><br>
      <canvas id="catGameCanvas" width="600" height="400"></canvas>
    </center>
  </section>

  <script>
    const canvas = document.getElementById("catGameCanvas");
    const ctx = canvas.getContext("2d");
    const modeButton = document.getElementById("modeButton");

    let mode = "laser"; // "laser" or "wand"
    let dotRadius = 10;
    let target = { x: 300, y: 200, vx: 2.5, vy: 2 };
    let speedMult = 1;
    let hitFlash = 0;

    // Wand handle drifts slowly across the top edge
    let handleX = 300;
    let handleDirX = 0.4;

    function randomBehavior() {
      if (Math.random() < 0.25) {
        // Pause, then dart
        speedMult = 0;
        setTimeout(() => {
          speedMult = 1.5 + Math.random() * 2;
          target.vx = (Math.random() - 0.5) * 7;
          target.vy = (Math.random() - 0.5) * 7;
        }, 300 + Math.random() * 700);
      } else {
        speedMult = 0.4 + Math.random() * 2.2;
      }
    }
    setInterval(randomBehavior, 1800);

    function update() {
      target.x += target.vx * speedMult;
      target.y += target.vy * speedMult;

      const pad = 25;
      if (target.x < pad) {
        target.x = pad;
        target.vx = Math.abs(target.vx) + (Math.random() - 0.5);
      }
      if (target.x > canvas.width - pad) {
        target.x = canvas.width - pad;
        target.vx = -Math.abs(target.vx) + (Math.random() - 0.5);
      }
      if (target.y < pad) {
        target.y = pad;
        target.vy = Math.abs(target.vy) + (Math.random() - 0.5);
      }
      if (target.y > canvas.height - pad) {
        target.y = canvas.height - pad;
        target.vy = -Math.abs(target.vy) + (Math.random() - 0.5);
      }

      handleX += handleDirX;
      if (handleX < 80 || handleX > canvas.width - 80) handleDirX *= -1;

      if (hitFlash > 0) hitFlash--;
    }

    function drawBackground() {
      ctx.fillStyle = "#1a1410";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (hitFlash > 0) {
        ctx.fillStyle = `rgba(255, 255, 150, ${(hitFlash / 15) * 0.3})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawLaser() {
      const x = target.x, y = target.y;
      // Soft outer glow
      const glow = ctx.createRadialGradient(x, y, 0, x, y, dotRadius * 5);
      glow.addColorStop(0, "rgba(255, 60, 60, 0.75)");
      glow.addColorStop(0.4, "rgba(220, 20, 20, 0.3)");
      glow.addColorStop(1, "rgba(200, 0, 0, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, dotRadius * 5, 0, Math.PI * 2);
      ctx.fill();
      // Main dot with bright white centre
      const dot = ctx.createRadialGradient(x, y, 0, x, y, dotRadius);
      dot.addColorStop(0, "#ffffff");
      dot.addColorStop(0.25, "#ff5555");
      dot.addColorStop(1, "#cc0000");
      ctx.fillStyle = dot;
      ctx.beginPath();
      ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSingleFeather(x, y, angle, len, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      // Feather vane shape
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(len * 0.25, len * 0.2, len * 0.3, len * 0.65, 0, len);
      ctx.bezierCurveTo(-len * 0.3, len * 0.65, -len * 0.25, len * 0.2, 0, 0);
      ctx.fillStyle = color;
      ctx.fill();
      // Spine
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, 2);
      ctx.lineTo(0, len * 0.9);
      ctx.stroke();
      ctx.restore();
    }

    function drawFeatherWand() {
      const tx = target.x, ty = target.y;
      const hy = 5; // string anchors at top edge
      // Natural-sag bezier string
      const cpX = (handleX + tx) / 2;
      const sag = 35 + Math.abs(tx - handleX) * 0.22;
      const cpY = (hy + ty) / 2 + sag;
      ctx.strokeStyle = "#b8904a";
      ctx.lineWidth = 1.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(handleX, hy);
      ctx.quadraticCurveTo(cpX, cpY, tx, ty);
      ctx.stroke();
      // Knot where feathers attach
      ctx.fillStyle = "#6a4a2a";
      ctx.beginPath();
      ctx.arc(tx, ty, 4, 0, Math.PI * 2);
      ctx.fill();
      // Fan of feathers drooping from knot
      const feathers = [
        { angle: -0.55, len: 38, color: "#d03010" },
        { angle: -0.20, len: 43, color: "#f09020" },
        { angle:  0.00, len: 46, color: "#f8f8f0" },
        { angle:  0.20, len: 43, color: "#e8c030" },
        { angle:  0.55, len: 38, color: "#c02010" },
      ];
      for (const f of feathers) {
        drawSingleFeather(tx, ty, f.angle, f.len, f.color);
      }
    }

    function draw() {
      drawBackground();
      if (mode === "laser") {
        drawLaser();
      } else {
        drawFeatherWand();
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function handleHit(mx, my) {
      const dist = Math.hypot(mx - target.x, my - target.y);
      if (mode === "laser") {
        if (dist < dotRadius * 2.5) {
          hitFlash = 15;
          dotRadius = dotRadius >= 35 ? 8 : dotRadius + 5;
        }
      } else {
        if (dist < 40) {
          hitFlash = 15;
        }
      }
    }

    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      handleHit((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
    });

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const t = e.touches[0];
      handleHit((t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy);
    }, { passive: false });

    modeButton.addEventListener("click", () => {
      mode = mode === "laser" ? "wand" : "laser";
      modeButton.textContent = mode === "laser" ? "Switch to FEATHER WAND" : "Switch to LASER";
    });

    loop();
  </script>

</main>

<div id="footer-container"></div>

<script>
  fetch('https://david-fear.github.io/components/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-container').innerHTML = data;
    })
    .catch(error => {
      console.error('Failed to load footer:', error);
    });
</script>

</body>
</html>
