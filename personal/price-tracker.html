<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Price Tracker</title>

  <link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

  <!-- Firebase v10 compat SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <style>
    .product-card {
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: 10px;
      margin: 1rem 0;
    }
    .product-card h2 {
      color: var(--primary);
      margin-bottom: 0.4rem;
      font-size: 1.2rem;
    }
    .product-card h2 a {
      color: inherit;
      text-decoration: none;
    }
    .product-card h2 a:hover {
      text-decoration: underline;
    }
    .price-display {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--primary);
      margin: 0.4rem 0;
      line-height: 1.2;
    }
    .price-display .currency {
      font-size: 1rem;
      opacity: 0.65;
      margin-left: 4px;
    }
    .price-change {
      font-size: 0.9rem;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .price-change.up   { color: #f44336; }
    .price-change.down { color: #4caf50; }
    .price-change.same { color: #888; }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }
    .status-badge.loading  { background: #333; color: #aaa; }
    .status-badge.saved    { background: #1a4d2e; color: #66bb6a; }
    .status-badge.skipped  { background: #2d3a1a; color: #aed581; }
    .status-badge.error    { background: #4d1a1a; color: #ef9a9a; }
    .last-updated {
      font-size: 0.78rem;
      opacity: 0.55;
      margin-bottom: 0.5rem;
    }
    .chart-container {
      position: relative;
      height: 240px;
      margin-top: 1rem;
    }
    .no-data-msg {
      text-align: center;
      padding: 2rem;
      opacity: 0.45;
      font-size: 0.9rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    @media (min-width: 920px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    /* Setup instructions box */
    .setup-box {
      background: #0d1f2d;
      border: 1px solid var(--primary);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .setup-box h2 {
      color: var(--primary);
      margin-bottom: 0.75rem;
    }
    .setup-box ol, .setup-box ul {
      padding-left: 1.5rem;
      margin: 0.5rem 0 1rem;
    }
    .setup-box li {
      margin: 0.4rem 0;
    }
    .setup-box pre {
      background: #050d14;
      color: #c9d1d9;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.82rem;
      margin: 0.75rem 0;
      white-space: pre;
    }
    .setup-box code {
      background: #1a2a3a;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.88em;
    }
    .tag-required {
      background: #ff9800;
      color: #111;
      font-size: 0.72rem;
      font-weight: bold;
      padding: 1px 7px;
      border-radius: 10px;
      vertical-align: middle;
      margin-left: 6px;
      letter-spacing: 0.05em;
    }
  </style>
</head>

<body>

<!-- Dynamic sidebar menu START - right after BODY tag -->
<div id="menu-container"></div>
<script>
  fetch('https://david-fear.github.io/components/menu.html')
    .then(response => response.text())
    .then(data => {
      const container = document.getElementById('menu-container');
      container.innerHTML = data;
      const toggle = document.getElementById('menu-toggle');
      const menu   = document.getElementById('menu-nav');
      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        if (menu.hasAttribute('hidden')) { menu.removeAttribute('hidden'); }
        else { menu.setAttribute('hidden', ''); }
      });
      toggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle.click(); }
      });
    })
    .catch(e => console.error('Failed to load menu:', e));
</script>
<!-- Dynamic sidebar menu END -->

  <header>
    <h1>Price Tracker</h1>
    <p>Monitors product prices over time — fetches live prices, stores daily snapshots in Firebase, graphs history.</p>
  </header>

  <main>
    <div id="setup-warning"></div>
    <div class="products-grid" id="products-grid"></div>
  </main>

  <!-- Footer placeholder -->
  <div id="footer-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/footer.html')
      .then(response => response.text())
      .then(data => { document.getElementById('footer-container').innerHTML = data; })
      .catch(error => { console.error('Failed to load footer:', error); });
  </script>

  <script>
    // ============================================================
    //  CONFIGURATION — fill in your Firebase values below
    // ============================================================

    // const FIREBASE_CONFIG = {
    //   apiKey:            "YOUR_API_KEY",
    //   authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    //   projectId:         "YOUR_PROJECT_ID",
    //   storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    //   messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    //   appId:             "YOUR_APP_ID"
    // };

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyD5aifJo-5N021fZfwWHM7vdQlKp6hkhxs",
      authDomain: "price-tracker-djf.firebaseapp.com",
      projectId: "price-tracker-djf",
      storageBucket: "price-tracker-djf.firebasestorage.app",
      messagingSenderId: "895209163047",
      appId: "1:895209163047:web:321542867ad97b743a0102"
    };

    // Add / remove products here. 'product' must be a unique slug.
    const PRODUCTS = [
      {
        product:  'gamenote-wired-gaming-mouse-black',
        name:     'GameNote Wired Gaming Mouse (Black)',
        url:      'https://www.thewarehouse.co.nz/p/gamenote-wired-gaming-mouse-black/R3016083.html',
        currency: 'NZD'
      }
      // Example — add more products by uncommenting and editing:
      // ,{
      //   product:  'my-product-slug',          // unique identifier
      //   name:     'My Product Display Name',
      //   url:      'https://retailer.co.nz/product-page',
      //   currency: 'NZD'
      // }
    ];

    // ============================================================
    //  END OF CONFIGURATION
    // ============================================================

    const ALLORIGINS_URL  = 'https://api.allorigins.win/get?url=';
    const FIRESTORE_COLL  = 'price-history';
    const PLACEHOLDER_STR = 'YOUR_';

    // ----- Helpers -----------------------------------------------

    function isConfigured() {
      return !Object.values(FIREBASE_CONFIG).some(v => String(v).startsWith(PLACEHOLDER_STR));
    }

    function todayStr() {
      // Returns YYYY-MM-DD in local time
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    // ----- Firebase -----------------------------------------------

    let _db = null;
    function getDb() {
      if (!_db) {
        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        _db = firebase.firestore();
      }
      return _db;
    }

    async function getHistory(db, productId) {
      const snap = await db.collection(FIRESTORE_COLL)
        .where('product', '==', productId)
        .orderBy('date', 'asc')
        .get();
      return snap.docs.map(d => d.data());
    }

    async function checkAndSave(db, productId, url, price) {
      const date  = todayStr();
      const docId = `${productId}__${date}`;
      const ref   = db.collection(FIRESTORE_COLL).doc(docId);
      const snap  = await ref.get();
      if (snap.exists) return { saved: false };
      await ref.set({ product: productId, date, value: price, url });
      return { saved: true };
    }

    // ----- Price fetching -----------------------------------------

    async function fetchPrice(productUrl) {
      const proxyUrl = ALLORIGINS_URL + encodeURIComponent(productUrl);
      let resp;
      try {
        resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(20000) });
      } catch (err) {
        throw new Error(`Proxy network error: ${err.message}`);
      }
      if (!resp.ok) throw new Error(`Proxy HTTP ${resp.status}`);

      const json = await resp.json();
      const html = json.contents;
      if (!html) throw new Error('Proxy returned empty content');

      const doc = new DOMParser().parseFromString(html, 'text/html');

      // --- Strategy 1: JSON-LD structured data (most reliable) ---
      for (const script of doc.querySelectorAll('script[type="application/ld+json"]')) {
        try {
          let data = JSON.parse(script.textContent);
          // Unwrap @graph wrapper if present
          if (data && data['@graph']) data = data['@graph'];
          const items = Array.isArray(data) ? data : [data];
          for (const item of items) {
            const types = Array.isArray(item['@type']) ? item['@type'] : [item['@type']];
            if (!types.includes('Product')) continue;
            const offers = item.offers;
            if (!offers) continue;
            const offer = Array.isArray(offers) ? offers[0] : offers;
            const price = parseFloat(offer.price ?? offer.lowPrice ?? offer.highPrice ?? '');
            if (!isNaN(price) && price > 0) {
              return { price, currency: offer.priceCurrency || 'NZD' };
            }
          }
        } catch (_) { /* keep trying */ }
      }

      // --- Strategy 2: <meta itemprop="price"> ---
      const metaPrice = doc.querySelector('meta[itemprop="price"]');
      if (metaPrice) {
        const p = parseFloat(metaPrice.getAttribute('content') || '');
        if (!isNaN(p) && p > 0) {
          const cur = doc.querySelector('meta[itemprop="priceCurrency"]');
          return { price: p, currency: cur?.getAttribute('content') || 'NZD' };
        }
      }

      // --- Strategy 3: common CSS selectors (fallback) ---
      const selectors = [
        '[data-testid="price-value"]',
        '[data-testid="price"]',
        '.price__current',
        '.price-current',
        '.current-price',
        '.product-price .current',
        '.product-info__price',
        '[itemprop="price"]'
      ];
      for (const sel of selectors) {
        const el = doc.querySelector(sel);
        if (!el) continue;
        const raw   = el.getAttribute('content') || el.textContent || '';
        const match = raw.replace(/,/g, '').match(/\d+(\.\d+)?/);
        if (match) {
          const p = parseFloat(match[0]);
          if (p > 0) return { price: p, currency: 'NZD' };
        }
      }

      throw new Error('Price not found on page (may require JS rendering)');
    }

    // ----- Chart --------------------------------------------------

    const _charts = {};
    function renderChart(canvasId, history) {
      if (_charts[canvasId]) _charts[canvasId].destroy();
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      _charts[canvasId] = new Chart(ctx.getContext('2d'), {
        type: 'line',
        data: {
          labels: history.map(h => h.date),
          datasets: [{
            label: 'Price',
            data: history.map(h => h.value),
            borderColor: '#4db8ff',
            backgroundColor: 'rgba(77,184,255,0.08)',
            pointBackgroundColor: '#4db8ff',
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` $${ctx.parsed.y.toFixed(2)} NZD`
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#b0b8c4', maxRotation: 45, font: { size: 11 } },
              grid:  { color: 'rgba(255,255,255,0.06)' }
            },
            y: {
              beginAtZero: false,
              ticks: {
                color: '#b0b8c4',
                font: { size: 11 },
                callback: v => `$${v.toFixed(2)}`
              },
              grid: { color: 'rgba(255,255,255,0.06)' }
            }
          }
        }
      });
    }

    // ----- UI helpers ---------------------------------------------

    function safeId(productSlug) {
      return productSlug.replace(/[^a-z0-9]/gi, '-');
    }

    function buildCard(p) {
      const id   = safeId(p.product);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.id = `card-${id}`;
      card.innerHTML = `
        <h2><a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.name}</a></h2>
        <div class="price-display" id="price-${id}">
          <span style="opacity:.35">—</span><span class="currency"> ${p.currency}</span>
        </div>
        <div class="last-updated" id="updated-${id}"></div>
        <span class="status-badge loading" id="status-${id}">Loading…</span>
        <div class="chart-container">
          <canvas id="chart-${id}"></canvas>
        </div>`;
      return card;
    }

    function setStatus(id, cls, msg) {
      const el = document.getElementById(`status-${id}`);
      if (!el) return;
      el.className = `status-badge ${cls}`;
      el.textContent = msg;
    }

    function setPrice(id, price, currency, history) {
      const prev = history.length >= 2 ? history[history.length - 2].value : null;
      let changeHtml = '';
      if (prev !== null) {
        const diff = price - prev;
        if      (diff >  0.005) changeHtml = `<span class="price-change up">▲ $${diff.toFixed(2)}</span>`;
        else if (diff < -0.005) changeHtml = `<span class="price-change down">▼ $${Math.abs(diff).toFixed(2)}</span>`;
        else                    changeHtml = `<span class="price-change same">— no change</span>`;
      }
      const el = document.getElementById(`price-${id}`);
      if (el) el.innerHTML = `$${price.toFixed(2)}<span class="currency"> ${currency}</span>${changeHtml}`;
      const upd = document.getElementById(`updated-${id}`);
      if (upd) upd.textContent = `Checked: ${new Date().toLocaleString()}`;
    }

    // ----- Setup instructions -------------------------------------

    function showSetupInstructions() {
      document.getElementById('setup-warning').innerHTML = `
        <div class="setup-box">
          <h2>Firebase Setup Required <span class="tag-required">ONE-TIME</span></h2>
          <p>This tracker stores price history in a free Firebase Firestore database. You need to create one and paste your config into this file.</p>
          <ol>
            <li>Go to <a href="https://console.firebase.google.com/" target="_blank" rel="noopener">console.firebase.google.com</a> → <strong>Add project</strong> (free Spark plan is sufficient).</li>
            <li>Inside the project, go to <strong>Build → Firestore Database</strong> → <em>Create database</em> → choose a region → start in <strong>Test mode</strong> (you can tighten rules later).</li>
            <li>Go to <strong>Project Settings</strong> (gear icon) → <em>Your apps</em> → click the <code>&lt;/&gt;</code> web icon → register the app → copy the <code>firebaseConfig</code> object shown.</li>
            <li>Edit <code>personal/price-tracker.html</code> in this repo and replace the <code>FIREBASE_CONFIG</code> values at the top of the script with your copied values.</li>
            <li>In Firestore → <strong>Rules</strong> tab, set (save after pasting):</li>
          </ol>
          <pre>rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /price-history/{doc} {
      allow read, write: if true;
    }
  }
}</pre>
          <p><strong>Recommended:</strong> In <em>Google Cloud Console → APIs → Credentials</em>, restrict your API key to <code>david-fear.github.io</code> so it can't be abused if seen in page source.</p>
          <p>Once configured, reload this page — it will fetch prices automatically and begin building history.</p>
        </div>`;
    }

    // ----- Main ---------------------------------------------------

    async function runProduct(p, db) {
      const id   = safeId(p.product);
      const grid = document.getElementById('products-grid');
      grid.appendChild(buildCard(p));

      // Step 1: Load existing history immediately so chart appears even if live fetch fails
      let history = [];
      try {
        history = await getHistory(db, p.product);
        if (history.length) {
          renderChart(`chart-${id}`, history);
          const latest = history[history.length - 1];
          setPrice(id, latest.value, p.currency, history);
        }
      } catch (e) {
        console.warn(`[${p.product}] History load error:`, e);
      }

      // Step 2: Fetch live price via CORS proxy
      setStatus(id, 'loading', 'Fetching live price…');
      let livePrice, liveCurrency;
      try {
        const result  = await fetchPrice(p.url);
        livePrice     = result.price;
        liveCurrency  = result.currency || p.currency;
      } catch (e) {
        setStatus(id, 'error', `Fetch failed: ${e.message.slice(0, 80)}`);
        if (!history.length) {
          const upd = document.getElementById(`updated-${id}`);
          if (upd) upd.textContent = 'No historical data available yet.';
        }
        return;
      }

      // Step 3: Save to Firestore (max once per day)
      setStatus(id, 'loading', 'Checking database…');
      let saved = false;
      try {
        const res = await checkAndSave(db, p.product, p.url, livePrice);
        saved = res.saved;
      } catch (e) {
        setStatus(id, 'error', `DB error: ${e.message.slice(0, 80)}`);
        // Still update UI with live price even if we couldn't save
        setPrice(id, livePrice, liveCurrency, history);
        return;
      }

      // Step 4: Reload history and refresh UI
      try {
        history = await getHistory(db, p.product);
      } catch (_) { /* use stale history */ }

      setPrice(id, livePrice, liveCurrency, history);
      if (history.length) renderChart(`chart-${id}`, history);
      setStatus(id, saved ? 'saved' : 'skipped', saved ? '✓ Price saved today' : '✓ Already recorded today');
    }

    async function runTracker() {
      if (!isConfigured()) {
        showSetupInstructions();
        // Render placeholder cards so layout is visible
        const grid = document.getElementById('products-grid');
        PRODUCTS.forEach(p => {
          const card = buildCard(p);
          grid.appendChild(card);
          setStatus(safeId(p.product), 'error', 'Firebase not configured');
          const upd = document.getElementById(`updated-${safeId(p.product)}`);
          if (upd) upd.textContent = 'See setup instructions above.';
        });
        return;
      }

      let db;
      try {
        db = getDb();
      } catch (e) {
        document.getElementById('setup-warning').innerHTML =
          `<div class="setup-box"><h2>Firebase Init Error</h2><p>${e.message}</p></div>`;
        return;
      }

      // Run all products concurrently
      await Promise.allSettled(PRODUCTS.map(p => runProduct(p, db)));
    }

    runTracker();
  </script>

</body>
</html>
