<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F1 2025</title>

  <link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

  <style>
    /* F1 Points Table Styles — matching 2026 */
    table.f1-points {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 30px;
      font-size: 6.5pt;
    }

    table.f1-points th,
    table.f1-points td {
      border: 1px solid #333;
      padding: 1pt;
      text-align: right;
    }

    table.f1-points th:first-child,
    table.f1-points td:first-child {
      text-align: left;
    }

    table.f1-points th:nth-child(2),
    table.f1-points td:nth-child(2),
    table.f1-points th:nth-child(3),
    table.f1-points td:nth-child(3) {
      text-align: left;
    }

    /* Gold highlight for race winner cells — matching 2026 */
    .max-val {
      background: linear-gradient(90deg, #b8860b, #ffd700);
      color: #000;
      font-weight: bold;
      animation: goldPulse 2s ease-in-out infinite;
    }

    @keyframes goldPulse {
      0%   { filter: brightness(1);    box-shadow: 0 0 0 rgba(255, 215, 0, 0); }
      50%  { filter: brightness(1.15); box-shadow: 0 0 8px rgba(255, 215, 0, 0.55); }
      100% { filter: brightness(1);    box-shadow: 0 0 0 rgba(255, 215, 0, 0); }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- Dynamic sidebar menu -->
  <div id="menu-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/menu.html')
      .then(response => response.text())
      .then(data => {
        const container = document.getElementById('menu-container');
        container.innerHTML = data;
        const toggle = document.getElementById('menu-toggle');
        const menu   = document.getElementById('menu-nav');
        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          if (menu.hasAttribute('hidden')) menu.removeAttribute('hidden');
          else menu.setAttribute('hidden', '');
        });
        toggle.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle.click(); }
        });
      })
      .catch(e => console.error('Failed to load menu:', e));
  </script>

  <header>
    <h1>Formula One 2025</h1>
    <p>Driver &amp; Constructor Standings</p>
  </header>

  <main>

    <!-- ── DRIVER CHART & TABLE ── -->
    <section>
      <h2>F1 2025 Cumulative Points Chart</h2>
      <div style="position:relative; height:500px; min-height:500px; max-height:500px; width:100%;">
        <canvas id="driverChart"></canvas>
      </div>

      <h2>F1 2025 Points Table</h2>
      <details>
        <summary>Show / Hide Table</summary>
        <table id="driverTable" class="f1-points">
          <thead></thead>
          <tbody></tbody>
        </table>
      </details>
    </section>

    <!-- ── CONSTRUCTOR CHART & TABLE ── -->
    <section>
      <h2>F1 2025 Constructor Cumulative Points Chart</h2>
      <div style="position:relative; height:500px; min-height:500px; max-height:500px; width:100%;">
        <canvas id="constructorChart"></canvas>
      </div>

      <h2>F1 2025 Constructor Points Table</h2>
      <details>
        <summary>Show / Hide Table</summary>
        <table id="constructorTable" class="f1-points">
          <thead></thead>
          <tbody></tbody>
        </table>
      </details>
    </section>

  </main>

  <script>
  (function () {

    const csvURL = 'https://david-fear.github.io/personal/formula1-data-2025.csv';

    /* ── COLOURS ── */
    const teamColors = {
      'Mercedes':     '#00D2BE',
      'Ferrari':      '#DC0000',
      'McLaren':      '#FF8000',
      'Red Bull':     '#3671C6',
      'Racing Bulls': '#8874D8',
      'Williams':     '#37BEDD',
      'Alpine':       '#FF87BC',
      'Haas':         '#FFFFFF',
      'Audi':         '#4E7C59',
      'Aston Martin': '#006F62',
      'Cadillac':     '#C8AA44'
    };

    /* ── DRIVER ABBREVIATIONS ── */
    const driverAbbr = {
      'Verstappen': 'VER', 'Norris':    'NOR', 'Piastri':   'PIA',
      'Leclerc':   'LEC', 'Hamilton':  'HAM', 'Russell':   'RUS',
      'Sainz':     'SAI', 'Antonelli': 'ANT', 'Alonso':    'ALO',
      'Stroll':    'STR', 'Gasly':     'GAS', 'Doohan':    'DOO',
      'Lawson':    'LAW', 'Tsunoda':   'TSU', 'Hadjar':    'HAD',
      'Bearman':   'BEA', 'Ocon':      'OCO', 'Bortoleto': 'BOR',
      'Hulkenberg':'HUL', 'Albon':     'ALB', 'Colapinto': 'COL',
      'Perez':     'PER'
    };

    /* ── TEAM ABBREVIATIONS (end-label on chart) ── */
    const teamAbbr = {
      'Mercedes':     'Mercedes',
      'Ferrari':      'Ferrari',
      'McLaren':      'McLaren',
      'Red Bull':     'Red Bull',
      'Racing Bulls': 'Racing Bulls',
      'Williams':     'Williams',
      'Alpine':       'Alpine',
      'Haas':         'Haas',
      'Audi':         'Audi',
      'Aston Martin': 'Aston Martin',
      'Cadillac':     'Cadillac'
    };

    /* ── GLOW PLUGIN (shared) ── */
    function makeGlowPlugin() {
      return {
        id: 'glowPlugin',
        beforeDatasetDraw(chart, args) {
          if (args.index === chart._hoveredIdx) {
            chart.ctx.save();
            chart.ctx.shadowColor = 'rgba(255, 255, 255, 1)';
            chart.ctx.shadowBlur  = 5;
          }
        },
        afterDatasetDraw(chart, args) {
          if (args.index === chart._hoveredIdx) {
            chart.ctx.restore();
          }
        }
      };
    }

    /* ── END-LABEL PLUGIN (driver abbreviations) ── */
    const driverEndLabels = {
      id: 'driverEndLabels',
      afterDraw(chart) {
        const c = chart.ctx;
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          if (!meta.visible) return;
          const last = meta.data[meta.data.length - 1];
          if (!last) return;
          c.save();
          c.font         = 'bold 8px sans-serif';
          c.fillStyle    = dataset.borderColor;
          c.textAlign    = 'left';
          c.textBaseline = 'middle';
          const abbr = driverAbbr[dataset.label] || dataset.label.substring(0, 3).toUpperCase();
          c.fillText(abbr, last.x + 4, last.y);
          c.restore();
        });
      }
    };

    /* ── END-LABEL PLUGIN (team names) ── */
    const teamEndLabels = {
      id: 'teamEndLabels',
      afterDraw(chart) {
        const c = chart.ctx;
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          if (!meta.visible) return;
          const last = meta.data[meta.data.length - 1];
          if (!last) return;
          c.save();
          c.font         = 'bold 8px sans-serif';
          c.fillStyle    = dataset.borderColor;
          c.textAlign    = 'left';
          c.textBaseline = 'middle';
          c.fillText(teamAbbr[dataset.label] || dataset.label.substring(0, 3).toUpperCase(), last.x + 4, last.y);
          c.restore();
        });
      }
    };

    /* ── HOVER HANDLER FACTORY ── */
    function hoverHandler(chart) {
      return function (event, elements) {
        const idx = elements && elements.length ? elements[0].datasetIndex : -1;
        if (idx !== chart._hoveredIdx) {
          chart._hoveredIdx = idx;
          chart.update('none');
        }
      };
    }

    /* ── LEGEND HOVER/LEAVE ── */
    function legendHover(event, legendItem, legend) {
      legend.chart._hoveredIdx = legendItem.datasetIndex;
      legend.chart.update('none');
    }
    function legendLeave(event, legendItem, legend) {
      legend.chart._hoveredIdx = -1;
      legend.chart.update('none');
    }

    /* ── PARSE & BUILD ── */
    Papa.parse(csvURL, {
      download:      true,
      header:        true,
      dynamicTyping: true,
      complete: function (results) {

        const data  = results.data.filter(r => r.driver);
        const races = Object.keys(data[0]).filter(k => !['driver', 'constructor', 'total'].includes(k));

        buildDriverChart(data, races);
        buildDriverTable(data, races);
        buildConstructorChartAndTable(data, races);
      }
    });

    /* ═══════════════════════════════════════════
       DRIVER CHART
       • Lawson / Tsunoda may appear twice (different teams).
       • Solid line = first entry for that driver/team combo.
       • Dotted line = second entry (same driver, different team).
    ═══════════════════════════════════════════ */
    function buildDriverChart(data, races) {
      const ctx = document.getElementById('driverChart').getContext('2d');

      /* Work out dash pattern: first occurrence solid, later dotted */
      const seen = {};
      const driverDash = data.map(row => {
        const key = row.driver;
        seen[key] = (seen[key] || 0) + 1;
        return seen[key] === 1 ? [] : [4, 4];
      });

      /* Sort by total descending */
      const totals = data.map(row => races.reduce((s, r) => s + (row[r] || 0), 0));
      const order  = totals.map((_, i) => i).sort((a, b) => totals[b] - totals[a]);

      const datasets = order.map((idx, rank) => {
        const row   = data[idx];
        const color = teamColors[row.constructor] || '#888888';
        let cumul   = 0;
        return {
          label:       row.driver,
          data:        races.map(r => { cumul += row[r] || 0; return cumul; }),
          fill:        false,
          borderColor: color,
          backgroundColor: color,
          borderDash:  driverDash[idx],
          borderWidth: 2,
          tension:     0.2,
          hidden:      rank >= data.length - 10   /* hide bottom 10 like 2026 */
        };
      });

      const glowPlugin = makeGlowPlugin();

      const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: races, datasets },
        plugins: [glowPlugin, driverEndLabels],
        options: {
          responsive:          true,
          maintainAspectRatio: false,
          layout: { padding: { right: 40 } },
          onHover: (event, elements) => hoverHandler(chart)(event, elements),
          plugins: {
            legend: {
              position: 'top',
              labels: {
                usePointStyle: true,
                generateLabels(c) {
                  const orig = Chart.defaults.plugins.legend.labels.generateLabels(c);
                  orig.forEach(label => {
                    const ds      = c.data.datasets[label.datasetIndex];
                    label.lineDash = ds.borderDash || [];
                    label.text    = driverAbbr[label.text] || label.text.substring(0, 3).toUpperCase();
                  });
                  return orig;
                }
              },
              onHover: legendHover,
              onLeave: legendLeave
            },
            title: { display: true, text: 'F1 2025 Cumulative Points' }
          },
          scales: { y: { beginAtZero: true } }
        }
      });

      chart._hoveredIdx = -1;
    }

    /* ═══════════════════════════════════════════
       DRIVER TABLE
       Handles same driver appearing twice with
       a note showing which team each stint was for.
    ═══════════════════════════════════════════ */
    function buildDriverTable(data, races) {
      const thead = document.querySelector('#driverTable thead');
      const tbody = document.querySelector('#driverTable tbody');

      /* Max per race for gold highlight */
      const maxPerRace = {};
      races.forEach(r => {
        maxPerRace[r] = Math.max(...data.map(row => row[r] || 0));
      });

      /* Header */
      let headerHTML = '<tr><th>Driver</th><th>Constructor</th>';
      races.forEach(r => headerHTML += `<th>${r}</th>`);
      headerHTML += '<th>Total</th></tr>';
      thead.innerHTML = headerHTML;

      /* Body — keep original CSV order */
      let bodyHTML = '';
      data.forEach(row => {
        let total = 0;
        let rowHTML = `<tr><td>${row.driver}</td><td>${row.constructor}</td>`;
        races.forEach(r => {
          const val   = row[r] || 0;
          total      += val;
          const isMax = val === maxPerRace[r] && val !== 0;
          rowHTML    += `<td class="${isMax ? 'max-val' : ''}">${val}</td>`;
        });
        rowHTML += `<td>${total}</td></tr>`;
        bodyHTML += rowHTML;
      });
      tbody.innerHTML = bodyHTML;
    }

    /* ═══════════════════════════════════════════
       CONSTRUCTOR CHART & TABLE
    ═══════════════════════════════════════════ */
    function buildConstructorChartAndTable(data, races) {

      /* Aggregate per team */
      const teamRacePoints = {};
      const teamDrivers    = {};

      data.forEach(row => {
        const team = row.constructor;
        if (!teamRacePoints[team]) {
          teamRacePoints[team] = {};
          teamDrivers[team]    = new Set();
        }
        teamDrivers[team].add(driverAbbr[row.driver] || row.driver.substring(0, 3).toUpperCase());
        races.forEach(r => {
          teamRacePoints[team][r] = (teamRacePoints[team][r] || 0) + (row[r] || 0);
        });
      });

      /* Sort by total */
      const teamTotals  = {};
      Object.keys(teamRacePoints).forEach(t => {
        teamTotals[t] = races.reduce((s, r) => s + teamRacePoints[t][r], 0);
      });
      const sortedTeams = Object.keys(teamRacePoints).sort((a, b) => teamTotals[b] - teamTotals[a]);

      const teamDriverStr = {};
      sortedTeams.forEach(t => {
        teamDriverStr[t] = Array.from(teamDrivers[t]).join(' ');
      });

      buildConstructorTable(sortedTeams, teamRacePoints, teamTotals, teamDriverStr, races);
      buildConstructorChart(sortedTeams, teamRacePoints, races);
    }

    function buildConstructorTable(sortedTeams, teamRacePoints, teamTotals, teamDriverStr, races) {
      const thead = document.querySelector('#constructorTable thead');
      const tbody = document.querySelector('#constructorTable tbody');

      const maxPerRace = {};
      races.forEach(r => {
        maxPerRace[r] = Math.max(...sortedTeams.map(t => teamRacePoints[t][r] || 0));
      });

      let headerHTML = '<tr><th>Constructor</th><th>Drivers</th>';
      races.forEach(r => headerHTML += `<th>${r}</th>`);
      headerHTML += '<th>Total</th></tr>';
      thead.innerHTML = headerHTML;

      let bodyHTML = '';
      sortedTeams.forEach(team => {
        let total   = 0;
        let rowHTML = `<tr><td>${team}</td><td>${teamDriverStr[team] || ''}</td>`;
        races.forEach(r => {
          const val   = teamRacePoints[team][r] || 0;
          total      += val;
          const isMax = val === maxPerRace[r] && val !== 0;
          rowHTML    += `<td class="${isMax ? 'max-val' : ''}">${val}</td>`;
        });
        rowHTML += `<td>${total}</td></tr>`;
        bodyHTML += rowHTML;
      });
      tbody.innerHTML = bodyHTML;
    }

    function buildConstructorChart(sortedTeams, teamRacePoints, races) {
      const ctx = document.getElementById('constructorChart').getContext('2d');

      const datasets = sortedTeams.map(team => {
        let cumul = 0;
        const totalPts = races.reduce((s, r) => s + (teamRacePoints[team][r] || 0), 0);
        return {
          label:           team,
          data:            races.map(r => { cumul += teamRacePoints[team][r] || 0; return cumul; }),
          fill:            false,
          borderColor:     teamColors[team] || '#888888',
          backgroundColor: teamColors[team] || '#888888',
          borderWidth:     2.5,
          tension:         0.2,
          pointRadius:     3,
          pointHoverRadius: 5,
          hidden:          totalPts === 0
        };
      });

      const glowPlugin = makeGlowPlugin();

      const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: races, datasets },
        plugins: [glowPlugin, teamEndLabels],
        options: {
          responsive:          true,
          maintainAspectRatio: false,
          layout: { padding: { right: 80 } },
          onHover: (event, elements) => hoverHandler(chart)(event, elements),
          plugins: {
            legend: {
              position: 'top',
              labels: {
                usePointStyle: true,
                generateLabels(c) {
                  const orig = Chart.defaults.plugins.legend.labels.generateLabels(c);
                  orig.forEach(label => {
                    label.text = teamAbbr[label.text] || label.text.substring(0, 3).toUpperCase();
                  });
                  return orig;
                }
              },
              onHover: legendHover,
              onLeave: legendLeave
            },
            title: { display: true, text: 'F1 2025 Cumulative Constructor Points' },
            tooltip: {
              callbacks: {
                title: items => items[0].dataset.label,
                label: item  => `After ${item.label}: ${item.raw} pts`
              }
            }
          },
          scales: {
            y: { beginAtZero: true },
            x: { ticks: { maxRotation: 45 } }
          }
        }
      });

      chart._hoveredIdx = -1;
    }

  })();
  </script>

  <!-- Footer placeholder -->
  <div id="footer-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/footer.html')
      .then(response => response.text())
      .then(data => { document.getElementById('footer-container').innerHTML = data; })
      .catch(error => { console.error('Failed to load footer:', error); });
  </script>

</body>
</html>
