<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Code Generator</title>

<link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

<style>
  .qr-layout {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .qr-controls {
    flex: 1;
    min-width: 280px;
    max-width: 440px;
  }
  .qr-preview {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 1rem;
  }
  #qr-canvas {
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    min-width: 60px;
    min-height: 60px;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.3rem;
    font-size: 0.9rem;
    color: var(--text);
  }
  .form-group input[type="number"],
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 0.45rem 0.6rem;
    border: 1px solid #555;
    border-radius: 5px;
    font-size: 0.95rem;
    box-sizing: border-box;
    background: var(--bg);
    color: var(--text);
  }
  .form-group textarea {
    resize: vertical;
    min-height: 70px;
  }
  .form-row {
    display: flex;
    gap: 0.8rem;
  }
  .form-row .form-group { flex: 1; }
  /* Colour pickers */
  .color-row {
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 0.7rem;
  }
  .color-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    font-size: 0.82rem;
    color: var(--text);
  }
  input[type="color"] {
    width: 48px;
    height: 38px;
    border: 1px solid #555;
    border-radius: 5px;
    padding: 2px;
    cursor: pointer;
    background: none;
  }
  /* Upload area */
  .upload-area {
    border: 2px dashed #555;
    border-radius: 8px;
    padding: 0.9rem;
    text-align: center;
    cursor: pointer;
    font-size: 0.88rem;
    color: #aaa;
    position: relative;
    transition: border-color 0.2s;
  }
  .upload-area:hover { border-color: var(--primary); color: var(--primary); }
  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  #logo-preview {
    max-width: 60px;
    max-height: 60px;
    border-radius: 6px;
    display: none;
    margin: 0.5rem auto 0;
    border: 1px solid #555;
  }
  .clear-logo {
    font-size: 0.82rem;
    color: #f66;
    cursor: pointer;
    text-decoration: underline;
    display: none;
    margin-top: 0.4rem;
    text-align: center;
  }
  /* Style picker buttons */
  .style-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }
  .style-btn {
    border: 2px solid #555;
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    padding: 0.45rem 0.2rem;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .style-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }
  .style-btn.active {
    border-color: var(--primary);
    background: var(--primary);
    color: #000;
    font-weight: 700;
  }
  /* Size stepper */
  .size-stepper {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .size-stepper button {
    width: 36px;
    height: 36px;
    padding: 0;
    font-size: 1.3rem;
    line-height: 1;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .size-stepper span {
    min-width: 60px;
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }
  /* Fieldsets */
  fieldset {
    border: 1px solid #555;
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin: 0 0 1rem 0;
  }
  legend {
    font-weight: 700;
    font-size: 0.9rem;
    padding: 0 0.4rem;
    color: var(--primary);
  }
  /* Checkbox */
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--text);
    margin-top: 0.4rem;
  }
  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
  }
  /* Download row */
  .download-row {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>

<body>

<!-- Dynamic sidebar menu START -->
<div id="menu-container"></div>
<script>
  fetch('https://david-fear.github.io/components/menu.html')
    .then(r => r.text())
    .then(data => {
      const container = document.getElementById('menu-container');
      container.innerHTML = data;
      const toggle = document.getElementById('menu-toggle');
      const menu = document.getElementById('menu-nav');
      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        menu.hasAttribute('hidden') ? menu.removeAttribute('hidden') : menu.setAttribute('hidden', '');
      });
      toggle.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle.click(); }
      });
    })
    .catch(e => console.error('Failed to load menu:', e));
</script>
<!-- Dynamic sidebar menu END -->

<header>
  <h1>QR Code Generator</h1>
  <p>Text or URL &mdash; optional centre logo &mdash; live preview updates instantly.</p>
</header>

<main>
  <section>
    <div class="qr-layout">

      <!-- ===== Controls ===== -->
      <div class="qr-controls">

        <div class="form-group">
          <label for="qr-content">Content (URL or text)</label>
          <textarea id="qr-content" placeholder="Enter URL or any text...">https://david-fear.github.io</textarea>
        </div>

        <fieldset>
          <legend>Dot Style</legend>
          <div class="style-grid" id="dot-style-grid">
            <button class="style-btn active" data-dots="square">Square</button>
            <button class="style-btn" data-dots="rounded">Rounded</button>
            <button class="style-btn" data-dots="extra-rounded">Extra Round</button>
            <button class="style-btn" data-dots="classy">Classy</button>
            <button class="style-btn" data-dots="classy-rounded">Classy Round</button>
            <button class="style-btn" data-dots="dot">Dot</button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Corner Style</legend>
          <div class="style-grid" id="corner-style-grid">
            <button class="style-btn active" data-corners="square">Square</button>
            <button class="style-btn" data-corners="extra-rounded">Rounded</button>
            <button class="style-btn" data-corners="dot">Dot</button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Colours</legend>
          <div class="color-row">
            <div class="color-item">
              <input type="color" id="color-dots" value="#000000" />
              <span>Dots</span>
            </div>
            <div class="color-item">
              <input type="color" id="color-bg" value="#ffffff" />
              <span>Background</span>
            </div>
            <div class="color-item">
              <input type="color" id="color-corners" value="#000000" />
              <span>Corners</span>
            </div>
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="transparent-bg" />
            Transparent background
          </label>
        </fieldset>

        <fieldset>
          <legend>Size &amp; Border</legend>
          <div class="form-group">
            <label>Size (px)</label>
            <div class="size-stepper">
              <button id="size-down">&#8722;</button>
              <span id="size-display">300</span>
              <button id="size-up">&#43;</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="qr-margin">Border (px)</label>
              <input type="number" id="qr-margin" value="16" min="0" max="100" step="4" />
            </div>
            <div class="form-group">
              <label for="qr-ecl">Error Correction</label>
              <select id="qr-ecl">
                <option value="L">L &mdash; Low (7%)</option>
                <option value="M" selected>M &mdash; Medium (15%)</option>
                <option value="Q">Q &mdash; Quartile (25%)</option>
                <option value="H">H &mdash; High (30%)</option>
              </select>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Centre Logo (optional)</legend>
          <div class="upload-area" id="upload-area">
            <input type="file" id="logo-file" accept="image/*" />
            Click or drag an image here
            <img id="logo-preview" src="" alt="Logo preview" />
          </div>
          <div class="clear-logo" id="clear-logo">&#x2715; Remove logo</div>
          <div class="form-row" style="margin-top:0.8rem">
            <div class="form-group">
              <label for="logo-size">Logo size %</label>
              <input type="number" id="logo-size" value="25" min="5" max="40" step="1" />
            </div>
            <div class="form-group">
              <label for="logo-margin">Logo margin</label>
              <input type="number" id="logo-margin" value="5" min="0" max="20" step="1" />
            </div>
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="logo-hide-dots" checked />
            Hide dots behind logo
          </label>
        </fieldset>

      </div><!-- end controls -->

      <!-- ===== Preview ===== -->
      <div class="qr-preview">
        <div id="qr-canvas"></div>
        <div class="download-row">
          <button id="dl-png">Download PNG</button>
          <button id="dl-svg">Download SVG</button>
        </div>
      </div>

    </div>
  </section>
</main>

<!-- Footer -->
<div id="footer-container"></div>
<script>
  fetch('https://david-fear.github.io/components/footer.html')
    .then(r => r.text())
    .then(data => { document.getElementById('footer-container').innerHTML = data; })
    .catch(e => console.error('Failed to load footer:', e));
</script>

<script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
<script>
  let logoDataUrl = null;
  let qrInstance  = null;
  let qrSize      = 300;

  // --- Size stepper ---
  document.getElementById('size-up').addEventListener('click', () => {
    if (qrSize < 1000) { qrSize += 10; document.getElementById('size-display').textContent = qrSize; generate(); }
  });
  document.getElementById('size-down').addEventListener('click', () => {
    if (qrSize > 100) { qrSize -= 10; document.getElementById('size-display').textContent = qrSize; generate(); }
  });

  // --- Style buttons: update on click ---
  document.getElementById('dot-style-grid').addEventListener('click', e => {
    const btn = e.target.closest('[data-dots]');
    if (!btn) return;
    document.querySelectorAll('[data-dots]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    generate();
  });
  document.getElementById('corner-style-grid').addEventListener('click', e => {
    const btn = e.target.closest('[data-corners]');
    if (!btn) return;
    document.querySelectorAll('[data-corners]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    generate();
  });

  // --- Colour pickers: update on any change ---
  ['color-dots', 'color-bg', 'color-corners'].forEach(id => {
    document.getElementById(id).addEventListener('input', generate);
  });

  // --- Transparent bg ---
  document.getElementById('transparent-bg').addEventListener('change', function () {
    document.getElementById('color-bg').disabled = this.checked;
    generate();
  });

  // --- Content: update on blur (exiting the box) ---
  document.getElementById('qr-content').addEventListener('blur', generate);

  // --- Other inputs: update on change ---
  ['qr-margin', 'qr-ecl', 'logo-size', 'logo-margin'].forEach(id => {
    document.getElementById(id).addEventListener('change', generate);
  });
  document.getElementById('logo-hide-dots').addEventListener('change', generate);

  // --- Logo upload ---
  document.getElementById('logo-file').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      logoDataUrl = e.target.result;
      const preview = document.getElementById('logo-preview');
      preview.src = logoDataUrl;
      preview.style.display = 'block';
      document.getElementById('clear-logo').style.display = 'block';
      this.value = '';
      generate();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('clear-logo').addEventListener('click', () => {
    logoDataUrl = null;
    const preview = document.getElementById('logo-preview');
    preview.style.display = 'none';
    preview.src = '';
    document.getElementById('clear-logo').style.display = 'none';
    generate();
  });

  // --- Download buttons ---
  document.getElementById('dl-png').addEventListener('click', () => {
    if (qrInstance) qrInstance.download({ name: 'qrcode', extension: 'png' });
  });
  document.getElementById('dl-svg').addEventListener('click', () => {
    if (qrInstance) qrInstance.download({ name: 'qrcode', extension: 'svg' });
  });

  // --- Core generate ---
  function generate() {
    const content = document.getElementById('qr-content').value.trim();
    if (!content) return;

    const dotsType     = document.querySelector('[data-dots].active')?.dataset.dots      || 'square';
    const cornersType  = document.querySelector('[data-corners].active')?.dataset.corners || 'square';
    const colorDots    = document.getElementById('color-dots').value;
    const colorCorners = document.getElementById('color-corners').value;
    const transparentBg = document.getElementById('transparent-bg').checked;
    const colorBg      = transparentBg ? 'transparent' : document.getElementById('color-bg').value;
    const margin       = parseInt(document.getElementById('qr-margin').value)  ?? 16;
    const ecl          = document.getElementById('qr-ecl').value;
    const logoSize     = parseInt(document.getElementById('logo-size').value) / 100 || 0.25;
    const logoMargin   = parseInt(document.getElementById('logo-margin').value) ?? 5;
    const logoHideDots = document.getElementById('logo-hide-dots').checked;

    const options = {
      width:  qrSize,
      height: qrSize,
      type:   'canvas',
      data:   content,
      margin: margin,
      qrOptions:            { errorCorrectionLevel: ecl },
      dotsOptions:          { type: dotsType,    color: colorDots },
      cornersSquareOptions: { type: cornersType, color: colorCorners },
      cornersDotOptions:    { type: cornersType === 'extra-rounded' ? 'dot' : cornersType, color: colorCorners },
      backgroundOptions:    { color: colorBg },
    };

    if (logoDataUrl) {
      options.image = logoDataUrl;
      options.imageOptions = {
        crossOrigin:        'anonymous',
        imageSize:          logoSize,
        margin:             logoMargin,
        hideBackgroundDots: logoHideDots,
      };
    }

    const container = document.getElementById('qr-canvas');
    container.innerHTML = '';
    qrInstance = new QRCodeStyling(options);
    qrInstance.append(container);
  }

  // Generate on load
  generate();
</script>

</body>
</html>
