<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Smart Diff</title>
<link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />
<style>
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  height:35vh;
}

textarea {
  width:100%;
  height:100%;
  resize:none;
  font-family: monospace;
  background-color: #2a2a2a;
  color: #808080;
}


#output {
  border:1px solid #ccc;
  padding:10px;
  height:45vh;
  overflow:auto;
  font-family: monospace;
  background-color: #2a2a2a;
  color: #808080;
}

.same {}
.add  { background:#1a4d2e; color:#b6ffcc; }
.del  { background:#4d1a1a; color:#ffb3b3; }

.row {
  white-space:pre;
}

.side {
  display:grid;
  grid-template-columns:1fr 1fr;
}

.cell {
  padding:2px 6px;
  white-space:pre;
  font-family: monospace;
}
</style>
</head>

<body>

<!-- Dynamic sidebar menu START - right after BODY tag -->
<div id="menu-container"></div>
<script>
  fetch('https://david-fear.github.io/components/menu.html')
    .then(response => response.text())
    .then(data => {
      const container = document.getElementById('menu-container');
      container.innerHTML = data;

      const toggle = document.getElementById('menu-toggle');
      const menu = document.getElementById('menu-nav');

      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        if (menu.hasAttribute('hidden')) {
          menu.removeAttribute('hidden');
        } else {
          menu.setAttribute('hidden', '');
        }
      });

      toggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle.click();
        }
      });
    })
    .catch(e => console.error('Failed to load menu:', e));
</script>
<!-- Dynamic sidebar menu END -->

  <main>
    <section>
      <h2><center>Smart Diff (LCS aligned)</center></h2>
    </section>
<section>
<div class="container">
<textarea id="left">Paste ...</textarea>
<textarea id="right">Paste ...</textarea>
</div>

<center><button onclick="runUnified()">Unified</button>
<button onclick="runUnified(true)">Unified (changes)</button>
<button onclick="runSide()">Side</button>
<button onclick="runSide(true)">Side (changes)</button>
</center>


<div id="output">Differences: ...</div>

<script>
function escapeHtml(s){
  return s.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;");
}

/* LCS diff */
function diff(a,b){

  const m=a.length;
  const n=b.length;

  const dp = Array(m+1).fill().map(()=>Array(n+1).fill(0));

  for(let i=m-1;i>=0;i--){
    for(let j=n-1;j>=0;j--){
      dp[i][j] = a[i]===b[j]
        ? dp[i+1][j+1]+1
        : Math.max(dp[i+1][j], dp[i][j+1]);
    }
  }

  let i=0,j=0;
  const out=[];

  while(i<m && j<n){
    if(a[i]===b[j]){
      out.push({type:"same",l:a[i],r:b[j]});
      i++; j++;
    }
    else if(dp[i+1][j] >= dp[i][j+1]){
      out.push({type:"del",l:a[i]});
      i++;
    }
    else{
      out.push({type:"add",r:b[j]});
      j++;
    }
  }

  while(i<m) out.push({type:"del",l:a[i++]});
  while(j<n) out.push({type:"add",r:b[j++]});

  return out;
}

function getData(){
  return {
    left: document.getElementById("left").value.trim().split("\n"),
    right: document.getElementById("right").value.trim().split("\n")
  };
}

function runUnified(changesOnly=false){
  const d=getData();
  const map=diff(d.left,d.right);

  output.innerHTML = map
    .filter(r => !changesOnly || r.type!=="same")
    .map(r=>{
      if(r.type==="same")
        return `<div class="row same">  ${escapeHtml(r.l)}</div>`;
      if(r.type==="del")
        return `<div class="row del">- ${escapeHtml(r.l)}</div>`;
      if(r.type==="add")
        return `<div class="row add">+ ${escapeHtml(r.r)}</div>`;
    }).join("");
}

function runSide(changesOnly=false){
  const d=getData();
  const map=diff(d.left,d.right);

  output.innerHTML =
    `<div class="side">`+
    map
      .filter(r => !changesOnly || r.type!=="same")
      .map(r=>{
        return `
          <div class="cell ${r.type==='del'?'del':''}">${escapeHtml(r.l||"")}</div>
          <div class="cell ${r.type==='add'?'add':''}">${escapeHtml(r.r||"")}</div>
        `;
      }).join("")+
    `</div>`;
}
</script>
</section>

<!-- Footer placeholder -->
<div id="footer-container"></div>
<script>
  fetch('https://david-fear.github.io/components/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-container').innerHTML = data;
    })
    .catch(error => {
      console.error('Failed to load footer:', error);
    });
</script>

</body>
</html>
