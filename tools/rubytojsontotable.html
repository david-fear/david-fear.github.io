<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruby Hash → JSON → Tables / CSV (FIXED)</title>

<link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

<style>
body {
  font-family: Arial, sans-serif;
}

textarea {
  width: 100%;
  box-sizing: border-box;
  font-family: monospace;
  margin-bottom: 10px;
  font-size: 0.8em;
}

#inputBox { height: 140px; }
#outputBox { height: 220px; }
#csvBox { height: 220px; }

#tableBox {
  height: 500px;
  overflow: auto;
  border: 1px solid #ccc;
  padding: 5px;
  font-family: monospace;
  font-size: 0.8em;
}

button {
  padding: 8px 14px;
  margin-right: 6px;
  margin-bottom: 10px;
}

table {
  border-collapse: collapse;
}

table, th, td {
  border: 1px solid #999;
}

th, td {
  padding: 3px 5px;
  text-align: left;
  vertical-align: top;
}

.controls { margin-bottom: 10px; }
</style>
</head>

<body>

<!-- MENU -->
<div id="menu-container"></div>
<script>
fetch('https://david-fear.github.io/components/menu.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('menu-container').innerHTML = html;
  });
</script>

<h2>Ruby Hash → JSON → HTML Tables / CSV</h2>

<textarea id="inputBox" placeholder="Paste Ruby hash here..."></textarea>

<button onclick="convertRubyHash()">Convert Ruby → JSON</button>

<h3>JSON Output</h3>
<textarea id="outputBox"></textarea>

<div class="controls">
  <label>
    CSV Header Layer:
    <select id="headerLayer">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </label>

  <button onclick="convertJSONtoTables()">JSON → Tables</button>
  <button onclick="convertJSONtoCSV()">JSON → CSV</button>
  <button onclick="downloadCSV()">Download CSV</button>
</div>

<h3>HTML Tables</h3>
<div id="tableBox"></div>

<h3>CSV Output</h3>
<textarea id="csvBox"></textarea>

<!-- FOOTER -->
<div id="footer-container"></div>
<script>
fetch('https://david-fear.github.io/components/footer.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('footer-container').innerHTML = html;
  });
</script>

<script>

/* =========================================================
   1. RUBY → JSON (ROBUST TOKEN PARSER)
========================================================= */

function convertRubyHash() {

  const input = document.getElementById('inputBox').value;

  try {

    const tokens = tokenize(input);
    const [obj] = parseValue(tokens, 0);

    document.getElementById('outputBox').value =
      JSON.stringify(obj, null, 2);

  } catch (e) {
    document.getElementById('outputBox').value =
      "ERROR: " + e.message;
  }
}

/* ---------------- TOKENISER ---------------- */

function tokenize(str) {

  let tokens = [];
  let i = 0;

  while (i < str.length) {

    let c = str[i];

    if (/\s/.test(c)) { i++; continue; }

    if (str.substr(i, 2) === "=>") {
      tokens.push({ type: "ARROW" });
      i += 2;
      continue;
    }

    if ("{},[]:".includes(c)) {
      tokens.push({ type: c });
      i++;
      continue;
    }

    // string
    if (c === '"') {

      let j = i + 1;
      let val = "";

      while (j < str.length) {
        let ch = str[j];
        if (ch === '"') break;
        if (ch === '\n' || ch === '\r') val += ' ';
        else val += ch;
        j++;
      }

      tokens.push({ type: "STRING", value: val });
      i = j + 1;
      continue;
    }

    // literal
    let j = i;
    let val = "";

    while (j < str.length &&
      !/\s/.test(str[j]) &&
      !"{},[]:".includes(str[j])) {
      val += str[j];
      j++;
    }

    if (val === "nil") val = null;

    tokens.push({ type: "LITERAL", value: val });
    i = j;
  }

  return tokens;
}

/* ---------------- PARSER ---------------- */

function parseValue(tokens, i) {

  const t = tokens[i];

  if (!t) throw new Error("Unexpected end");

  if (t.type === "{") {

    let obj = {};
    i++;

    while (tokens[i] && tokens[i].type !== "}") {

      let key = tokens[i].value;
      i++;

      if (tokens[i] && tokens[i].type === "ARROW") i++;

      let [val, ni] = parseValue(tokens, i);
      obj[key] = val;
      i = ni;

      if (tokens[i] && tokens[i].type === ",") i++;
    }

    return [obj, i + 1];
  }

  if (t.type === "[") {

    let arr = [];
    i++;

    while (tokens[i] && tokens[i].type !== "]") {

      let [val, ni] = parseValue(tokens, i);
      arr.push(val);
      i = ni;

      if (tokens[i] && tokens[i].type === ",") i++;
    }

    return [arr, i + 1];
  }

  if (t.type === "STRING") return [t.value, i + 1];

  return [t.value, i + 1];
}

/* =========================================================
   2. JSON → TABLES
========================================================= */

function convertJSONtoTables() {

  try {

    const obj = JSON.parse(document.getElementById('outputBox').value);
    document.getElementById('tableBox').innerHTML = jsonToTable(obj);

  } catch (e) {
    document.getElementById('tableBox').innerHTML = "ERROR: " + e.message;
  }
}

function jsonToTable(obj) {

  if (Array.isArray(obj)) {
    return `<table>` +
      obj.map(i => `<tr><td>${jsonToTable(i)}</td></tr>`).join('') +
      `</table>`;
  }

  if (obj && typeof obj === 'object') {

    let rows = "";

    for (let k in obj) {
      rows += `<tr><th>${k}</th><td>${jsonToTable(obj[k])}</td></tr>`;
    }

    return `<table>${rows}</table>`;
  }

  return obj === null ? "null" : String(obj);
}

/* =========================================================
   3. LAYER EXTRACTOR
========================================================= */

function getLayerObject(obj, level, current = 0) {

  if (current >= level) return obj;

  if (Array.isArray(obj)) {
    return obj.flatMap(i =>
      getLayerObject(i, level, current + 1)
    );
  }

  if (obj && typeof obj === 'object') {

    let out = [];

    for (let k in obj) {
      out.push(getLayerObject(obj[k], level, current + 1));
    }

    return out.flat();
  }

  return [];
}

/* =========================================================
   4. FLATTEN
========================================================= */

function flattenObject(obj, prefix = "", out = {}) {

  for (let k in obj) {

    let v = obj[k];
    let key = prefix ? `${prefix}.${k}` : k;

    if (Array.isArray(v)) {
      out[key] = JSON.stringify(v);
    }
    else if (v && typeof v === 'object') {
      flattenObject(v, key, out);
    }
    else {
      out[key] = v;
    }
  }

  return out;
}

/* =========================================================
   5. JSON → CSV (WITH LEVEL SUPPORT)
========================================================= */

function convertJSONtoCSV() {

  try {

    let data = JSON.parse(document.getElementById('outputBox').value);
    let level = parseInt(document.getElementById('headerLayer').value);

    if (level > 0) {
      data = getLayerObject(data, level);
      data = data.filter(x => x && typeof x === 'object');
    }

    if (!Array.isArray(data)) data = [data];

    let flat = data.map(flattenObject);

    let headers = [...new Set(flat.flatMap(o => Object.keys(o)))];

    let csv = [headers.join(',')];

    for (let row of flat) {
      csv.push(headers.map(h => {
        let v = row[h] ?? "";
        v = String(v).replace(/"/g, '""');
        return (v.includes(',') || v.includes('\n'))
          ? `"${v}"`
          : v;
      }).join(','));
    }

    document.getElementById('csvBox').value = csv.join('\n');

  } catch (e) {
    document.getElementById('csvBox').value = "ERROR: " + e.message;
  }
}

/* =========================================================
   6. DOWNLOAD CSV
========================================================= */

function downloadCSV() {

  let csv = document.getElementById('csvBox').value;
  if (!csv) return alert("No CSV");

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement('a');
  a.href = url;
  a.download = "output.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

</script>

</body>
</html>
