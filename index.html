<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Fear's Site - TV Stuff</title>

  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="https://david-fear.github.io/stylesheet.css" />

  <style>
    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 2px;
      max-width: 900px;
      margin:  auto;
    }

    button {
      width: 100%;
      font-size: 1em;
      padding: 10px;
      cursor: pointer;
    }

    section {
      text-align: center;
    }
  </style>
</head>

<body>
  <!-- Dynamic sidebar menu START -->
  <div id="menu-container"></div>
  <script>
    fetch('https://david-fear.github.io/components/menu.html')
      .then(response => response.text())
      .then(data => {
        const container = document.getElementById('menu-container');
        container.innerHTML = data;

        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('menu-nav');

        toggle.addEventListener('click', () => {
          const expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!expanded));
          if (menu.hasAttribute('hidden')) {
            menu.removeAttribute('hidden');
          } else {
            menu.setAttribute('hidden', '');
          }
        });

        toggle.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle.click();
          }
        });
      })
      .catch(e => console.error('Failed to load menu:', e));
  </script>
  <!-- Dynamic sidebar menu END -->

  <section>

      <button onclick="window.location.href='https://world-geography-games.com/en/flags_world.html'">Quiz - World Flags</button>
      <button onclick="window.location.href='/personal/timestables.html'">Times Tables!</button>
      <button onclick="window.location.href='https://www.fantasyherd.co.nz/'">Fantasy Herd</button>
    </div>
  </section>

  <section>

      <button onclick="window.location.href='https://famelack.com/'">Famelack.com</button>
      <button onclick="window.location.href='https://channelsurfer.tv'">ChannelSurfer.tv</button>
      <button onclick="window.location.href='https://tubitv.com/'">TubiTV.com</button>
      <button onclick="window.location.href='https://channelsurfer.tv'">ChannelSurfer.tv</button>
      <button onclick="window.location.href='https://worldmonitor.app'">WorldMonitor.app</button>

  </div>

  <section>

  <!-- Footer placeholder -->
  <div id="footer-container"></div>

  <script>
    fetch('https://david-fear.github.io/components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-container').innerHTML = data;
      })
      .catch(error => {
        console.error('Failed to load footer:', error);
      });
  </script>

</body>
</html>
